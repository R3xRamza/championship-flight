const { useState, useEffect, useCallback, useMemo, useRef, createContext, useContext } = React;

// ============================================================
// API CLIENT
// ============================================================
const API = (() => {
  const BASE = '/api';
  const TOKEN_LS = 'cf_token_persistent';
  const TOKEN_SS = 'cf_token';
  let token = null;

  function readStoredToken() {
    try {
      const ls = localStorage.getItem(TOKEN_LS);
      if (ls) return ls;
      return sessionStorage.getItem(TOKEN_SS);
    } catch (e) {
      return null;
    }
  }
  token = readStoredToken();

  async function request(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(`${BASE}${path}`, { cache: 'no-store', ...opts, headers });
    const text = await res.text();
    let data = {};
    try {
      data = text ? JSON.parse(text) : {};
    } catch {
      throw new Error(text?.slice(0, 200) || `Request failed (${res.status})`);
    }
    if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
    return data;
  }

  return {
    setToken(t, rememberSession = false) {
      token = t || null;
      try {
        localStorage.removeItem(TOKEN_LS);
        sessionStorage.removeItem(TOKEN_SS);
        if (t) {
          if (rememberSession) localStorage.setItem(TOKEN_LS, t);
          else sessionStorage.setItem(TOKEN_SS, t);
        }
      } catch (e) { /* ignore */ }
    },
    getToken() { return token; },
    login: (email, password) => request('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) }),
    register: (body) => request('/auth/register', { method: 'POST', body: JSON.stringify(body) }),
    patchProfile: (body) => request('/auth/me', { method: 'PATCH', body: JSON.stringify(body) }),
    me: () => request('/auth/me'),
    getCourses: () => request('/courses'),
    getCourse: (id) => request(`/courses/${id}`),
    getMatches: () => request('/matches'),
    getMatch: (id) => request(`/matches/${id}`),
    createMatch: (data) => request('/matches', { method: 'POST', body: JSON.stringify(data) }),
    updateMatch: (id, data) => request(`/matches/${id}`, { method: 'PATCH', body: JSON.stringify(data) }),
    finishMatch: (matchId) => request(`/matches/${matchId}`, { method: 'PATCH', body: JSON.stringify({ finish: true }) }),
    getScores: (matchId) => request(`/matches/${matchId}/scores`),
    postScore: (matchId, data) => request(`/matches/${matchId}/scores`, { method: 'POST', body: JSON.stringify(data) }),
    getBets: (matchId) => request(`/matches/${matchId}/bets`),
    createBet: (matchId, data) => request(`/matches/${matchId}/bets`, { method: 'POST', body: JSON.stringify(data) }),
    getWallet: () => request('/wallet'),
    getTransactions: () => request('/wallet/transactions'),
    deposit: (amount) => request('/wallet/deposit', { method: 'POST', body: JSON.stringify({ amount }) }),
    withdraw: (amount) => request('/wallet/withdraw', { method: 'POST', body: JSON.stringify({ amount }) }),
    getWalletStats: () => request('/wallet/stats'),
    getLeaderboard: () => request('/leaderboard'),
    getUsers: () => request('/users'),
    getFriends: () => request('/friends'),
    acceptFriendInvite: (code) =>
      request('/friends/accept', { method: 'POST', body: JSON.stringify({ code }) }),
  };
})();

/**
 * Pick the match the scorecard / clubhouse should treat as "current".
 * Prefers rounds you created (newest by updated/created time) so an older
 * shared active match does not steal the scorecard after you start your own.
 */
function pickActiveMatchForUser(matches, userId) {
  if (!Array.isArray(matches)) return null;
  const actives = matches.filter((m) => {
    const s = String(m?.status || '').toLowerCase();
    return s === 'active' || s === 'in_progress';
  });
  if (!actives.length) return null;
  let pool = actives;
  if (userId) {
    const mine = actives.filter((m) => m.created_by === userId);
    if (mine.length) pool = mine;
  }
  const ts = (m) => new Date(m.updated_at || m.created_at || 0).getTime();
  return [...pool].sort((a, b) => ts(b) - ts(a))[0];
}

/** Match formats that normally have a main pool when a wager is set at tee time. */
function matchFormatExpectsMainWager(match) {
  const t = String(match?.game_type || match?.gameType || '').toLowerCase();
  return ['skins', 'match_play', 'stroke_play', 'nassau', 'stampede', 'teams'].includes(t);
}

// ============================================================
// AUTH CONTEXT
// ============================================================
const AuthContext = createContext(null);

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        if (API.getToken()) {
          const me = await API.me();
          setUser(me);
        }
      } catch (e) {
        API.setToken(null);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const signOut = useCallback(() => {
    API.setToken(null);
    setUser(null);
  }, []);

  const refreshUser = useCallback(async () => {
    if (!API.getToken()) return;
    const me = await API.me();
    setUser(me);
  }, []);

  return (
    <AuthContext.Provider value={{ user, setUser, loading, signOut, refreshUser }}>
      {children}
    </AuthContext.Provider>
  );
}

function useAuth() { return useContext(AuthContext); }

/** Short label vs par for score-picker (e.g. Birdie, Par). */
function strokeRelativeLabel(strokes, par) {
  const d = strokes - par;
  if (d <= -3) return 'Albatross+';
  if (d === -2) return 'Eagle';
  if (d === -1) return 'Birdie';
  if (d === 0) return 'Par';
  if (d === 1) return 'Bogey';
  if (d === 2) return 'Double';
  return 'Triple+';
}

/** Six preset scores for a 2-row × 3-column grid: par 3 → 1–6, par 4 → 2–7, par 5 → 3–8. */
function strokePresetsForPar(par) {
  const p = Number(par);
  if (p === 3) return [1, 2, 3, 4, 5, 6];
  if (p === 4) return [2, 3, 4, 5, 6, 7];
  if (p === 5) return [3, 4, 5, 6, 7, 8];
  const low = Math.max(1, p - 2);
  return [low, low + 1, low + 2, low + 3, low + 4, low + 5];
}

/** Junk / fun marks for a hole (when match has junk enabled). `penalty` = can apply over par (Snake, Worm). */
const JUNK_MARKS = [
  { id: 'sandy', label: 'Sandy', sub: 'from a bunker', icon: 'beach_access', tone: 'neutral', penalty: false },
  { id: 'barky', label: 'Barky', sub: 'off a tree', icon: 'park', tone: 'neutral', penalty: false },
  { id: 'sharky', label: 'Sharky', sub: 'from the water', icon: 'waves', tone: 'neutral', penalty: false },
  { id: 'hogan', label: 'Hogan', sub: 'fairway and green', icon: 'straighten', tone: 'neutral', penalty: false },
  { id: 'gorilla', label: 'Gorilla', sub: 'eagle putt', icon: 'fitness_center', tone: 'neutral', penalty: false },
  { id: 'snake', label: 'Snake', sub: '3 putt', icon: 'texture', tone: 'bad', penalty: true },
  { id: 'polie', label: 'Polie', sub: 'putt outside the stick', icon: 'flag', tone: 'neutral', penalty: false },
  { id: 'nasty', label: 'Nasty', sub: 'chip in', icon: 'mood_bad', tone: 'neutral', penalty: false },
  { id: 'ctp', label: 'CTP', sub: 'closest on par 3', icon: 'location_on', tone: 'neutral', penalty: false },
  { id: 'worm', label: 'Worm', sub: 'lost drive', icon: 'bug_report', tone: 'bad', penalty: true },
];

function junkParOrBetter(strokes, par) {
  return strokes != null && par != null && Number(strokes) <= Number(par);
}

/** Hogan / Gorilla do not apply on par 3s. */
function junkMarkInactiveOnParThree(markId, par) {
  const p = Number(par);
  return p === 3 && (markId === 'hogan' || markId === 'gorilla');
}

/** Build junk object for API: winning marks only if par or better; penalty marks always. */
function buildJunkPayload(modalJunkObj, strokes, par) {
  const out = {};
  const ok = junkParOrBetter(strokes, par);
  JUNK_MARKS.forEach(m => {
    if (!modalJunkObj[m.id]) return;
    if (junkMarkInactiveOnParThree(m.id, par)) return;
    if (m.penalty || ok) out[m.id] = true;
  });
  return out;
}

function junkGoodBadCounts(junk, holePar) {
  if (!junk || typeof junk !== 'object') return { good: 0, bad: 0 };
  let good = 0;
  let bad = 0;
  JUNK_MARKS.forEach(m => {
    if (!junk[m.id]) return;
    if (Number(holePar) === 3 && (m.id === 'hogan' || m.id === 'gorilla')) return;
    if (m.penalty) bad += 1;
    else good += 1;
  });
  return { good, bad };
}

/** Winning junk marks on posted holes (Snake/Worm excluded — side settlement). Matches server settle rules for display. */
function junkMarksEarnedFromHoles(playerHoles, courseHoles) {
  const parAt = {};
  (courseHoles || []).forEach((h) => {
    parAt[h.hole_number] = h.par;
  });
  let c = 0;
  for (const rec of playerHoles || []) {
    if (rec.strokes == null) continue;
    const j = rec.junk;
    if (!j || typeof j !== 'object') continue;
    const par = Number(rec.par) || Number(parAt[rec.hole_number]) || 4;
    const parOrBetter = Number(rec.strokes) <= par;
    JUNK_MARKS.forEach((m) => {
      if (!j[m.id]) return;
      if (m.penalty) return;
      if (junkMarkInactiveOnParThree(m.id, par)) return;
      if (!parOrBetter) return;
      c += 1;
    });
  }
  return c;
}

function displayJunkAmount(match) {
  const n = Number(match?.junk_amount);
  if (!Number.isFinite(n) || n <= 0) return 1;
  return n;
}

/** Treat junk as on only when explicitly true (handles junkEnabled vs junk_enabled from API). */
function isJunkEnabled(m) {
  const v = m?.junk_enabled ?? m?.junkEnabled;
  if (v === false || v === 0 || v === 'false' || v === '0') return false;
  return v === true || v === 1 || v === '1' || v === 'true';
}

function playerInOnBetRow(p) {
  return p.in_on_bet !== false && p.inOnBet !== false;
}

/**
 * When every scoreboard row uses the same tee, return one label for the YDS header row.
 * Falls back to match-level tee name when all rows share the same tee_set_id.
 */
function unifiedScoreboardTeeLabel(rows, matchTeeName) {
  const list = rows || [];
  if (list.length === 0) return null;
  const ids = list.map((r) => r.tee_set_id ?? r.teeSetId ?? null);
  const firstId = ids[0];
  const allSameId =
    firstId != null
    && firstId !== ''
    && ids.every((id) => id === firstId);
  const nameStrs = list.map((r) => String(r.tee_name ?? r.teeName ?? '').trim());
  const nonEmptyNames = nameStrs.filter(Boolean);
  if (nonEmptyNames.length === list.length && nonEmptyNames.every((n) => n === nonEmptyNames[0])) {
    return nonEmptyNames[0];
  }
  if (allSameId && nonEmptyNames.length > 0) {
    const uniq = [...new Set(nonEmptyNames)];
    if (uniq.length === 1) return uniq[0];
  }
  if (allSameId) {
    const m = String(matchTeeName || '').trim();
    return m || null;
  }
  return null;
}

/** Negative if a should sort before b (better standing / fewer strokes). */
function compareScoreboardByGame(a, b, { matchIsStampede, matchIsNet, netScoreView }) {
  const playedA = (a.holes || []).some((s) => s.strokes != null);
  const playedB = (b.holes || []).some((s) => s.strokes != null);

  if (matchIsStampede) {
    const va = Number(a.stampede_vs_quota ?? a.stampedeVsQuota);
    const vb = Number(b.stampede_vs_quota ?? b.stampedeVsQuota);
    const fa = Number.isFinite(va);
    const fb = Number.isFinite(vb);
    if (fa && fb && va !== vb) return vb - va;
    if (fa !== fb) return fa ? -1 : 1;
    const pa = Number(a.stampede_points ?? a.stampedePoints) || 0;
    const pb = Number(b.stampede_points ?? b.stampedePoints) || 0;
    if (pa !== pb) return pb - pa;
    const ta = playedA ? Number(a.total) || 0 : 999999;
    const tb = playedB ? Number(b.total) || 0 : 999999;
    if (ta !== tb) return ta - tb;
    return 0;
  }

  if (matchIsNet && netScoreView) {
    const sa = Number(a.strokes_off_leader ?? a.strokesOffLeader) || 0;
    const sb = Number(b.strokes_off_leader ?? b.strokesOffLeader) || 0;
    if (sa !== sb) return sa - sb;
    const na = playedA ? Number(a.netToPar ?? a.net_to_par) : 999;
    const nb = playedB ? Number(b.netToPar ?? b.net_to_par) : 999;
    if (na !== nb) return na - nb;
    const ta = playedA ? Number(a.total) || 0 : 999999;
    const tb = playedB ? Number(b.total) || 0 : 999999;
    return ta - tb;
  }

  const ta = playedA ? Number(a.toPar) : 999;
  const tb = playedB ? Number(b.toPar) : 999;
  if (ta !== tb) return ta - tb;
  const la = playedA ? Number(a.total) || 0 : 999999;
  const lb = playedB ? Number(b.total) || 0 : 999999;
  return la - lb;
}

/**
 * Scorecard / summary table row order: same as the API roster — never re-order by scores or standing.
 */
function orderScoreboardPlayers(rows, _userId, ctx) {
  const list = [...(rows || [])];
  if (!ctx?.matchIsTeams || list.length === 0) return list;
  return list.sort((a, b) => {
    const ta = Number(a.team_index ?? a.teamIndex);
    const tb = Number(b.team_index ?? b.teamIndex);
    const okA = ta === 1 || ta === 2;
    const okB = tb === 1 || tb === 2;
    if (okA !== okB) return okA ? -1 : 1;
    if (okA && ta !== tb) return ta - tb;
    return String(a.display_name || '').localeCompare(String(b.display_name || ''));
  });
}

function teamBestAtHole(teamBestBallRows, holeNumber, teamKey) {
  const row = (teamBestBallRows || []).find((r) => Number(r.hole_number) === Number(holeNumber));
  if (!row) return null;
  const v = teamKey === 2 ? row.team_2 : row.team_1;
  return v != null && Number.isFinite(Number(v)) ? Number(v) : null;
}

function teamBestSumOverHoles(teamBestBallRows, holeMetas, teamKey) {
  let sum = 0;
  let any = false;
  for (const hm of holeMetas || []) {
    const v = teamBestAtHole(teamBestBallRows, hm.hole_number, teamKey);
    if (v == null) continue;
    any = true;
    sum += v;
  }
  return { sum, any };
}

/** Keeps gross/net numbers vertically aligned; stroke + junk sit below in the cell without shifting the score. */
const SCORE_CELL_STACK = 'relative mx-auto flex h-16 w-full max-w-[2.75rem] items-center justify-center';

// Score cell styling
function ScoreCell({ strokes, par, className = '', onClick, junk, strokesReceived = 0, netView = false }) {
  if (strokes == null || strokes === 0) {
    return (
      <td className={`py-3 px-2 text-center align-middle text-on-surface-variant/30 ${className}`}>
        <div className={SCORE_CELL_STACK}>
          <span className="inline-flex items-center justify-center w-8 h-8 text-sm">—</span>
        </div>
      </td>
    );
  }
  const recv = Math.max(0, Math.round(Number(strokesReceived) || 0));
  const gross = Number(strokes);
  const effective = netView ? gross - recv : gross;
  const diff = effective - par;
  let cls = '';
  if (diff <= -2) cls = 'eagle-circle';
  else if (diff === -1) cls = 'birdie-circle';
  else if (diff === 1) cls = 'bogey-square';
  else if (diff >= 2) cls = 'dbl-bogey-square';

  const color = diff < 0 ? 'text-primary font-bold' : diff > 0 ? 'text-error' : '';
  const { good: junkGood } = junkGoodBadCounts(junk, par);
  const hasSnake = !!(junk && typeof junk === 'object' && junk.snake);
  const hasWorm = !!(junk && typeof junk === 'object' && junk.worm);
  const junkTitle = junk && typeof junk === 'object'
    ? Object.entries(junk)
      .filter(([, v]) => v)
      .filter(([k]) => !(Number(par) === 3 && (k === 'hogan' || k === 'gorilla')))
      .map(([k]) => JUNK_MARKS.find(m => m.id === k)?.label || k)
      .join(', ')
    : '';
  const showStroke = netView && recv > 0;
  const showJunk = junkGood > 0 || hasSnake || hasWorm;
  return (
    <td onClick={onClick} className={`py-3 px-2 text-center align-middle ${className}`}>
      <div className={SCORE_CELL_STACK}>
        <span className={`${cls} inline-flex items-center justify-center w-8 h-8 text-sm shrink-0 ${color}`}>{effective}</span>
        {(showStroke || showJunk) && (
          <div className="pointer-events-none absolute bottom-0 left-1/2 flex w-max max-w-[4.5rem] -translate-x-1/2 flex-col items-center gap-0.5 pb-0.5 text-center leading-none">
            {showStroke && (
              <span className="text-[8px] font-bold text-secondary" title="Handicap strokes on this hole">
                +{recv} stroke{recv === 1 ? '' : 's'}
              </span>
            )}
            {showJunk && (
              <span className="inline-flex items-center gap-1" title={junkTitle || 'Junk marks'}>
                {junkGood > 0 && (
                  <span className="text-[8px] font-bold text-secondary tracking-tighter">
                    {'●'.repeat(Math.min(junkGood, 4))}{junkGood > 4 ? '+' : ''}
                  </span>
                )}
                {(hasSnake || hasWorm) && (
                  <span className="text-[8px] font-black text-error tracking-tight font-label lowercase whitespace-nowrap">
                    {hasSnake ? 's' : ''}{hasSnake && hasWorm ? '\u00a0' : ''}{hasWorm ? 'w' : ''}
                  </span>
                )}
              </span>
            )}
          </div>
        )}
      </div>
    </td>
  );
}

function sideBetDisplayName(betType) {
  const map = {
    skins: 'Skins',
    match_play: 'Match play',
    teams: 'Teams match play',
    stroke_play: 'Stroke play',
    nassau: 'Nassau',
    stampede: 'Stampede',
    birdie_bet: 'Birdie bet',
    par_save: 'Par save',
    eagle_bet: 'Eagle or better',
    greenie: 'Greenie',
  };
  return map[betType] || betType;
}

function propBetTypesWithScope() {
  return ['match_play', 'teams', 'birdie_bet', 'par_save', 'eagle_bet', 'greenie'];
}

function formatBetPlacementShort(b) {
  const s = b.bet_scope || 'each_hole';
  const h = b.hole_number != null ? Number(b.hole_number) : null;
  if (s === 'one_hole' && h) return `Hole ${h} only`;
  if (s === 'rest_of_round' && h) return `Holes ${h}–18`;
  return 'Every hole';
}

function betRulesHint(b) {
  const n = b.participants?.length || 0;
  const a = Number(b.amount || 0);
  let base;
  switch (b.bet_type) {
    case 'skins': base = `${n} players · $${a}/hole + carry`; break;
    case 'match_play': base = `${n} players · $${a}/hole (low gross wins)`; break;
    case 'teams': base = `${n} players · $${a}/hole (best-ball team match)`; break;
    case 'stroke_play': base = `${n} players · $${a} on 18-hole total`; break;
    case 'stampede': base = `${n} players · $${a} on highest Stampede points (18 holes)`; break;
    case 'nassau': base = `${n} players · $${a} per leg (Out, In, Total)`; break;
    case 'birdie_bet': base = `${n} players · $${a}/hole (birdie+)`; break;
    case 'par_save': base = `${n} players · $${a}/hole (par or better)`; break;
    case 'eagle_bet': base = `${n} players · $${a}/hole (eagle+)`; break;
    case 'greenie': base = `${n} players · $${a}/hole (GIR + par or better)`; break;
    default: base = `${n} players`;
  }
  if (propBetTypesWithScope().includes(b.bet_type)) {
    return `${base} · ${formatBetPlacementShort(b)}`;
  }
  return base;
}

const ScorecardScreen = () => {
  const navigate = useNavigate();
  const location = useLocation();
  const [searchParams] = useSearchParams();
  const { user } = useAuth();
  const [matchData, setMatchData] = useState(null);
  const [scoreData, setScoreData] = useState(null);
  const [bets, setBets] = useState([]);
  const [scoringMode, setScoringMode] = useState('gross');
  const [scoreModal, setScoreModal] = useState(null);
  const [modalStrokes, setModalStrokes] = useState(null);
  const [modalManualScoreDraft, setModalManualScoreDraft] = useState('');
  const [modalJunk, setModalJunk] = useState({});
  const [loading, setLoading] = useState(true);
  const [finishing, setFinishing] = useState(false);
  const [finishRoundAwaitingConfirm, setFinishRoundAwaitingConfirm] = useState(false);
  const [holeNavBusy, setHoleNavBusy] = useState(false);
  const [viewHole, setViewHole] = useState(null);
  const [hideMyRoundScore, setHideMyRoundScore] = useState(() => {
    try {
      return localStorage.getItem('sandbags_hide_my_round_score') === '1';
    } catch (e) {
      return false;
    }
  });
  const finishConfirmTimeoutRef = useRef(null);
  const requestedMatchId = (searchParams.get('matchId') || '').trim();
  const requestedMode = (searchParams.get('mode') || '').trim().toLowerCase();

  const loadData = useCallback(async () => {
    try {
      const matches = await API.getMatches();
      const targetFromQuery = requestedMatchId
        ? matches.find((m) => String(m.id) === String(requestedMatchId))
        : null;
      const target = targetFromQuery || pickActiveMatchForUser(matches, user?.id);
      if (!target) {
        setMatchData(null);
        setScoreData(null);
        setBets([]);
        setLoading(false);
        return;
      }
      const match = await API.getMatch(target.id);
      const [scores, betsFromEndpoint] = await Promise.all([
        API.getScores(target.id),
        API.getBets(target.id).catch((err) => {
          console.error('getBets failed; falling back to match.bets if present', err);
          return null;
        }),
      ]);
      const arr = Array.isArray(betsFromEndpoint) ? betsFromEndpoint : [];
      const fromMatch = Array.isArray(match?.bets) ? match.bets : [];
      const mergedBets = arr.length > 0 ? arr : fromMatch;
      setMatchData(match);
      setScoreData(scores);
      setBets(mergedBets);
    } catch (e) {
      console.error(e);
    }
    setLoading(false);
  }, [requestedMatchId, user?.id]);

  useEffect(() => {
    loadData();
  }, [loadData, location.pathname, location.key]);

  useEffect(() => {
    if (matchData?.current_hole == null) return;
    setViewHole(Number(matchData.current_hole));
  }, [matchData?.id]);

  useEffect(() => {
    if (!matchData) return;
    setScoringMode(matchData.scoring_mode === 'net' ? 'net' : 'gross');
  }, [matchData?.id, matchData?.scoring_mode]);

  useEffect(() => {
    return () => {
      if (finishConfirmTimeoutRef.current != null) {
        clearTimeout(finishConfirmTimeoutRef.current);
      }
    };
  }, []);

  useEffect(() => {
    if (finishConfirmTimeoutRef.current != null) {
      clearTimeout(finishConfirmTimeoutRef.current);
      finishConfirmTimeoutRef.current = null;
    }
    setFinishRoundAwaitingConfirm(false);
  }, [matchData?.id]);

  useEffect(() => {
    if (loading) return;
    if (!matchData || !scoreData) {
      navigate('/new-match', { replace: true });
    }
  }, [loading, matchData, scoreData, navigate]);

  useEffect(() => {
    if (!loading && matchData && requestedMode === 'resume') {
      const s = String(matchData.status || '').toLowerCase();
      if (!(s === 'active' || s === 'in_progress')) {
        window.alert('This round is no longer in progress.');
      }
    }
  }, [loading, matchData, requestedMode]);

  const closeScoreModal = () => {
    setScoreModal(null);
    setModalStrokes(null);
    setModalManualScoreDraft('');
    setModalJunk({});
  };

  const openScoreModal = (holeNumber, userId, displayName, par, existingStrokes, existingJunk) => {
    const parN = Number(par) || 4;
    setScoreModal({ holeNumber, userId, displayName, par: parN });
    const presets = strokePresetsForPar(parN);
    const ex = typeof existingStrokes === 'number' && existingStrokes > 0 ? existingStrokes : null;
    setModalStrokes(ex);
    setModalManualScoreDraft(ex != null && !presets.includes(ex) ? String(ex) : '');
    const j = {};
    if (existingJunk && typeof existingJunk === 'object') {
      JUNK_MARKS.forEach(m => {
        if (!existingJunk[m.id]) return;
        if (junkMarkInactiveOnParThree(m.id, parN)) return;
        j[m.id] = true;
      });
    }
    setModalJunk(j);
  };

  const toggleModalJunk = (id) => {
    const mark = JUNK_MARKS.find(m => m.id === id);
    const par = Number(scoreModal?.par) || 4;
    if (junkMarkInactiveOnParThree(id, par)) return;
    if (mark && !mark.penalty && scoreModal && (modalStrokes == null || !junkParOrBetter(modalStrokes, par))) return;
    setModalJunk(prev => {
      const next = { ...prev };
      if (next[id]) delete next[id];
      else next[id] = true;
      return next;
    });
  };

  useEffect(() => {
    if (!scoreModal) return;
    const onKey = (e) => { if (e.key === 'Escape') closeScoreModal(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [scoreModal]);

  const matchJunkOn = isJunkEnabled(matchData);

  useEffect(() => {
    if (!scoreModal || !matchJunkOn || modalStrokes == null) return;
    if (junkParOrBetter(modalStrokes, scoreModal.par)) return;
    setModalJunk(prev => {
      let changed = false;
      const next = { ...prev };
      JUNK_MARKS.forEach(m => {
        if (!m.penalty && next[m.id]) {
          delete next[m.id];
          changed = true;
        }
      });
      return changed ? next : prev;
    });
  }, [modalStrokes, scoreModal?.holeNumber, scoreModal?.userId, scoreModal?.par, matchJunkOn]);

  useEffect(() => {
    if (!scoreModal || !matchJunkOn) return;
    const p = Number(scoreModal.par) || 4;
    if (p !== 3) return;
    setModalJunk(prev => {
      if (!prev.hogan && !prev.gorilla) return prev;
      const next = { ...prev };
      delete next.hogan;
      delete next.gorilla;
      return next;
    });
  }, [scoreModal?.holeNumber, scoreModal?.par, matchJunkOn]);

  const confirmModalScore = async () => {
    if (!scoreModal || modalStrokes == null || modalStrokes < 1 || !matchData) return;
    try {
      const body = {
        holeNumber: scoreModal.holeNumber,
        strokes: modalStrokes,
        userId: scoreModal.userId,
      };
      if (isJunkEnabled(matchData)) {
        body.junk = buildJunkPayload(modalJunk, modalStrokes, scoreModal.par);
      }
      await API.postScore(matchData.id, body);
      closeScoreModal();
      loadData();
    } catch (e) { console.error(e); }
  };

  if (loading || !matchData || !scoreData) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-surface">
        <p className="text-on-surface-variant text-sm">
          {loading ? 'Loading scorecard…' : 'Opening new match…'}
        </p>
      </div>
    );
  }

  const holes = scoreData.holes || [];
  const front9 = holes.filter(h => h.hole_number <= 9);
  const back9 = holes.filter(h => h.hole_number > 9);
  const skinsBet = bets.find(b => b.bet_type === 'skins');
  const teamsMoneyBet = bets.find((b) => b.bet_type === 'teams' && Number(b.amount) > 0);
  const gameTypeLc = String(matchData.game_type || matchData.gameType || '').toLowerCase();
  const matchIsTeams = gameTypeLc === 'teams';
  const betsOrdered = [...bets].sort((a, b) => {
    const aMain = gameTypeLc && String(a.bet_type || '').toLowerCase() === gameTypeLc ? 0 : 1;
    const bMain = gameTypeLc && String(b.bet_type || '').toLowerCase() === gameTypeLc ? 0 : 1;
    if (aMain !== bMain) return aMain - bMain;
    return String(a.name || a.id || '').localeCompare(String(b.name || b.id || ''));
  });
  const myBetNet = bets.reduce((sum, b) => {
    const p = b.participants?.find(x => x.user_id === user?.id);
    return sum + (Number(p?.net_result) || 0);
  }, 0);
  const junkRoster = [...(matchData.players || [])].sort((a, b) => {
    if (a.user_id === user?.id) return -1;
    if (b.user_id === user?.id) return 1;
    return String(a.display_name || '').localeCompare(String(b.display_name || ''));
  });
  const myJunkNet = Number(junkRoster.find((p) => p.user_id === user?.id)?.junk_net_result) || 0;
  const totalYou = myBetNet + myJunkNet;

  const matchIsNet = matchData.scoring_mode === 'net';
  const matchIsStampede = String(matchData.game_type || matchData.gameType || '').toLowerCase() === 'stampede';
  const netScoreView = matchIsNet && !matchIsStampede && scoringMode === 'net';
  const rawScoreboard = scoreData.scoreboard || [];
  const showInOutBadges =
    rawScoreboard.length > 0
    && rawScoreboard.some(playerInOnBetRow)
    && rawScoreboard.some((p) => !playerInOnBetRow(p));
  const scoreboardPlayers = orderScoreboardPlayers(rawScoreboard, user?.id, {
    matchIsStampede,
    matchIsNet,
    netScoreView,
    matchIsTeams,
  });
  const unifiedTeeLabel = unifiedScoreboardTeeLabel(scoreData.scoreboard, matchData.tee_name);

  const teamBestRows = scoreData.team_best_ball || scoreData.teamBestBall || [];
  const liveHoleNum = Number(matchData.current_hole) || 1;
  const viewHoleNum = Math.min(18, Math.max(1, Number(viewHole ?? liveHoleNum) || liveHoleNum));
  const viewingAwayFromLive = viewHoleNum !== liveHoleNum;
  let teamHolesWon = null;
  if (matchIsTeams && teamsMoneyBet && teamBestRows.length) {
    let w1 = 0;
    let w2 = 0;
    for (const h of holes) {
      if (h.hole_number >= liveHoleNum) continue;
      const row = teamBestRows.find((r) => Number(r.hole_number) === Number(h.hole_number));
      if (!row || row.team_1 == null || row.team_2 == null) continue;
      if (row.team_1 < row.team_2) w1++;
      else if (row.team_2 < row.team_1) w2++;
    }
    teamHolesWon = { w1, w2 };
  }

  const viewHoleMeta = holes.find((h) => h.hole_number === viewHoleNum);
  const viewHolePar = viewHoleMeta?.par ?? '?';
  const viewHoleYdsRaw = viewHoleMeta?.yardage;
  const viewHoleYdsNum = Number(viewHoleYdsRaw);
  const viewHoleYdsLabel =
    viewHoleYdsRaw != null && viewHoleYdsRaw !== '' && Number.isFinite(viewHoleYdsNum)
      ? `${viewHoleYdsNum} yds`
      : '— yds';
  const atFinalHole = liveHoleNum >= 18;

  const hasScoreForHole = (player, holeNum) => {
    const sc = player.holes?.find((s) => Number(s.hole_number) === Number(holeNum));
    return sc != null && sc.strokes != null && Number(sc.strokes) >= 1;
  };
  const inPlayersThisRound = scoreboardPlayers.filter(playerInOnBetRow);
  const baseAllInHaveScore =
    inPlayersThisRound.length === 0
    || inPlayersThisRound.every((p) => hasScoreForHole(p, liveHoleNum));
  let teamSidesHaveBestBall = true;
  if (matchIsTeams && teamsMoneyBet && inPlayersThisRound.length > 0) {
    const t1In = inPlayersThisRound.filter((p) => Number(p.team_index ?? p.teamIndex) === 1);
    const t2In = inPlayersThisRound.filter((p) => Number(p.team_index ?? p.teamIndex) === 2);
    if (t1In.length > 0 && t2In.length > 0) {
      teamSidesHaveBestBall =
        t1In.some((p) => hasScoreForHole(p, liveHoleNum))
        && t2In.some((p) => hasScoreForHole(p, liveHoleNum));
    }
  }
  const allInHaveScoreCurrentHole = baseAllInHaveScore && teamSidesHaveBestBall;
  const canGoNextHole = allInHaveScoreCurrentHole && !atFinalHole;

  const browseHole = (holeNum) => {
    const next = Math.min(18, Math.max(1, Number(holeNum)));
    if (!Number.isInteger(next)) return;
    setViewHole(next);
  };

  const advanceHole = async () => {
    if (!matchData || !canGoNextHole || holeNavBusy) return;
    const next = Math.min(liveHoleNum + 1, 18);
    setHoleNavBusy(true);
    try {
      await API.updateMatch(matchData.id, { currentHole: next });
      setViewHole(next);
      await loadData();
    } catch (e) { console.error(e); }
    setHoleNavBusy(false);
  };

  const meRow = scoreboardPlayers.find((p) => p.user_id === user?.id);
  const myRoundToPar = meRow
    ? (netScoreView ? meRow.netToPar : meRow.toPar)
    : null;
  const myRoundToParLabel =
    myRoundToPar == null || myRoundToPar === '' ? '—'
      : myRoundToPar === 0 ? 'E'
        : myRoundToPar > 0 ? `+${myRoundToPar}`
          : String(myRoundToPar);
  const toggleHideMyRoundScore = () => {
    setHideMyRoundScore((prev) => {
      const next = !prev;
      try {
        localStorage.setItem('sandbags_hide_my_round_score', next ? '1' : '0');
      } catch (e) { /* ignore */ }
      return next;
    });
  };

  const runFinishRound = async () => {
    if (!matchData || finishing) return;
    if (finishConfirmTimeoutRef.current != null) {
      clearTimeout(finishConfirmTimeoutRef.current);
      finishConfirmTimeoutRef.current = null;
    }
    setFinishRoundAwaitingConfirm(false);
    setFinishing(true);
    try {
      await API.finishMatch(matchData.id);
      const tok = API.getToken();
      try {
        if (tok) sessionStorage.setItem('cf_token', tok);
      } catch (err) { /* ignore */ }
      const id = matchData.id;
      const origin = window.location.origin;
      const hashLooksLikeApp = typeof window !== 'undefined' && window.location.hash.startsWith('#/');
      const isHashApp = appUsesHashRouter || hashLooksLikeApp;
      if (isHashApp) {
        window.location.hash = `#/match-summary/${id}`;
        window.location.reload();
        return;
      }
      window.location.assign(`${origin}/match-summary/${id}`);
    } catch (e) {
      console.error(e);
      window.alert(e.message || 'Could not finish the round. Check that the server is running and you are logged in.');
      setFinishing(false);
    }
  };

  const onFinishRoundButtonClick = () => {
    if (!matchData || finishing) return;
    if (finishRoundAwaitingConfirm) {
      void runFinishRound();
      return;
    }
    setFinishRoundAwaitingConfirm(true);
    if (finishConfirmTimeoutRef.current != null) {
      clearTimeout(finishConfirmTimeoutRef.current);
    }
    finishConfirmTimeoutRef.current = setTimeout(() => {
      finishConfirmTimeoutRef.current = null;
      setFinishRoundAwaitingConfirm(false);
    }, 3500);
  };

  const shortCourse =
    matchData.course_name?.split(' ').slice(0, 2).join(' ') || 'Play';
  const moneyLabel =
    (bets.length > 0 || matchJunkOn)
      ? `${totalYou >= 0 ? '+' : ''}${totalYou.toFixed(2)}`
      : null;
  const carryLabel = skinsBet
    ? `Carry $${Number(skinsBet.carry_over || 0).toFixed(2)}`
    : (matchIsTeams && teamsMoneyBet && teamHolesWon)
      ? `T1 ${teamHolesWon.w1}–T2 ${teamHolesWon.w2}`
      : null;

  return (
    <div className="min-h-[100dvh]">
      <TopHeader title="Play" />
      <main className="page-pad phone-page px-4 space-y-4" style={{ paddingBottom: 'calc(var(--nav-h) + 6.75rem)' }}>
        <section className="rise-in space-y-2">
          <div className="flex items-start justify-between gap-2">
            <p className="text-[11px] font-semibold text-on-surface-variant truncate min-w-0">
              {matchData.course_name}
            </p>
            <div className="flex items-center gap-1.5 shrink-0">
              {matchIsNet && !matchIsStampede && (
                <div className="bg-white border border-primary/10 p-0.5 rounded-lg flex">
                  <button type="button" onClick={() => setScoringMode('gross')} className={`px-2 py-1 rounded-md text-[11px] font-bold ${scoringMode === 'gross' ? 'bg-primary text-white' : 'text-on-surface-variant'}`}>G</button>
                  <button type="button" onClick={() => setScoringMode('net')} className={`px-2 py-1 rounded-md text-[11px] font-bold ${scoringMode === 'net' ? 'bg-primary text-white' : 'text-on-surface-variant'}`}>N</button>
                </div>
              )}
              <button
                type="button"
                disabled={finishing}
                onClick={onFinishRoundButtonClick}
                className={`text-[11px] font-bold uppercase tracking-wide px-2 py-1 rounded-md ${
                  finishRoundAwaitingConfirm
                    ? 'bg-primary text-white'
                    : 'text-on-surface-variant'
                } disabled:opacity-60`}
              >
                {finishing ? '…' : finishRoundAwaitingConfirm ? 'Confirm?' : 'Finish'}
              </button>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <button
              type="button"
              aria-label="Previous hole"
              disabled={viewHoleNum <= 1}
              onClick={() => browseHole(viewHoleNum - 1)}
              className="shrink-0 w-9 h-9 rounded-lg flex items-center justify-center text-primary disabled:opacity-30 bg-white border border-primary/10"
            >
              <span className="material-symbols-outlined text-[22px]">chevron_left</span>
            </button>
            <div className="min-w-0 flex-1 flex items-end gap-2">
              <h2 className="font-headline italic text-[2.75rem] text-primary leading-none tabular-nums">
                {viewHoleNum}
              </h2>
              <div className="pb-1 min-w-0">
                <p className="text-[15px] font-bold text-primary leading-tight">
                  Par {viewHolePar}
                </p>
                <p className="text-[12px] text-on-surface-variant truncate">
                  {viewHoleYdsLabel}
                  {matchData.tee_name ? ` · ${matchData.tee_name}` : ''}
                </p>
              </div>
            </div>
            <button
              type="button"
              aria-label="Next hole"
              disabled={viewHoleNum >= 18}
              onClick={() => browseHole(viewHoleNum + 1)}
              className="shrink-0 w-9 h-9 rounded-lg flex items-center justify-center text-primary disabled:opacity-30 bg-white border border-primary/10"
            >
              <span className="material-symbols-outlined text-[22px]">chevron_right</span>
            </button>
            {viewingAwayFromLive && (
              <button
                type="button"
                onClick={() => browseHole(liveHoleNum)}
                className="shrink-0 self-center text-[10px] font-bold uppercase tracking-wide text-on-surface-variant border border-primary/15 bg-white rounded-md px-1.5 py-1 leading-none"
                title={`Jump to live hole ${liveHoleNum}`}
              >
                Live {liveHoleNum}
              </button>
            )}
          </div>
        </section>

        <div className="rise-in flex items-center justify-end gap-2 min-h-[1.25rem]">
          {hideMyRoundScore ? (
            <button
              type="button"
              onClick={toggleHideMyRoundScore}
              className="inline-flex items-center gap-1 text-[11px] font-semibold text-on-surface-variant"
              aria-label="Show your round score"
            >
              <span className="material-symbols-outlined text-[16px]">visibility</span>
              Show score
            </button>
          ) : (
            <div className="inline-flex items-center gap-1.5">
              <p className="text-[12px] text-on-surface-variant">
                Your score{' '}
                <span className="font-bold tabular-nums text-primary">{myRoundToParLabel}</span>
              </p>
              <button
                type="button"
                onClick={toggleHideMyRoundScore}
                className="p-0.5 text-on-surface-variant/70 hover:text-on-surface-variant"
                aria-label="Hide your round score"
                title="Hide score"
              >
                <span className="material-symbols-outlined text-[16px]">visibility_off</span>
              </button>
            </div>
          )}
        </div>

        <section className="rise-in-delay score-sheet rounded-2xl overflow-hidden shadow-[0_12px_40px_-24px_rgba(11,46,34,0.35)]">
          <div className="px-4 pt-3.5 pb-2 flex items-center justify-between gap-2 border-b border-primary/8 bg-white">
            <p className="text-[11px] font-bold uppercase tracking-[0.14em] text-on-surface-variant">
              Hole {viewHoleNum} · tap to score
            </p>
            <p className="text-[11px] font-semibold text-on-surface-variant tabular-nums">
              {scoreboardPlayers.filter((p) => hasScoreForHole(p, viewHoleNum)).length}/{scoreboardPlayers.length}
            </p>
          </div>
          <ul className="divide-y divide-primary/8">
            {scoreboardPlayers.map((player) => {
              const isMe = player.user_id === user?.id;
              const sc = player.holes?.find((s) => Number(s.hole_number) === Number(viewHoleNum));
              const strokes = sc?.strokes;
              const netByHole = player.net_strokes_by_hole || player.netStrokesByHole || {};
              const recv = netByHole[viewHoleNum] || netByHole[String(viewHoleNum)] || 0;
              const displayStrokes =
                netScoreView && strokes != null && Number(strokes) >= 1
                  ? Math.max(1, Number(strokes) - Number(recv || 0))
                  : strokes;
              const parN = viewHolePar === '?' ? 4 : Number(viewHolePar);
              const vsPar =
                displayStrokes != null && Number(displayStrokes) >= 1
                  ? Number(displayStrokes) - parN
                  : null;
              const relLabel = vsPar == null ? null : strokeRelativeLabel(Number(displayStrokes), parN);
              let scoreShape = '';
              if (vsPar != null) {
                if (vsPar <= -2) scoreShape = 'eagle-circle';
                else if (vsPar === -1) scoreShape = 'birdie-circle';
                else if (vsPar === 1) scoreShape = 'bogey-square';
                else if (vsPar >= 2) scoreShape = 'dbl-bogey-square';
              }
              const name = String(player.display_name || '?').trim();
              const parts = name.split(/\s+/);
              const initials = parts.length >= 2
                ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
                : name.slice(0, 2).toUpperCase();
              const teamN = Number(player.team_index ?? player.teamIndex);
              const metaBits = [];
              if (matchIsTeams && [1, 2].includes(teamN)) metaBits.push(`T${teamN}`);
              if (showInOutBadges) metaBits.push(playerInOnBetRow(player) ? 'In' : 'Out');
              if (netScoreView && recv > 0) metaBits.push(`+${recv}`);
              if (matchIsStampede) metaBits.push(`Q ${player.stampede_quota ?? player.stampedeQuota ?? '—'}`);
              return (
                <li key={player.user_id}>
                  <button
                    type="button"
                    onClick={() =>
                      openScoreModal(
                        viewHoleNum,
                        player.user_id,
                        player.display_name,
                        viewHolePar === '?' ? 4 : viewHolePar,
                        strokes || null,
                        sc?.junk
                      )
                    }
                    className={`w-full flex items-center gap-3.5 px-4 py-4 text-left hole-chip transition-colors ${
                      isMe ? 'bg-primary/[0.03]' : 'bg-white'
                    }`}
                  >
                    <div
                      className={`w-11 h-11 rounded-full flex items-center justify-center shrink-0 text-[13px] font-bold ${
                        isMe
                          ? 'bg-primary text-white'
                          : 'bg-surface-container-high text-primary'
                      }`}
                      aria-hidden
                    >
                      {isMe ? 'You' : initials}
                    </div>
                    <div className="min-w-0 flex-1">
                      <p className={`text-[17px] font-semibold truncate ${isMe ? 'text-primary' : 'text-on-surface'}`}>
                        {isMe ? 'You' : player.display_name}
                      </p>
                      {(relLabel || metaBits.length > 0) && (
                        <p className="text-[12px] text-on-surface-variant mt-0.5 truncate">
                          {[relLabel, ...metaBits].filter(Boolean).join(' · ')}
                        </p>
                      )}
                    </div>
                    <div className="flex flex-col items-center gap-1 shrink-0">
                      <div
                        className={`w-[3.75rem] h-[3.75rem] flex items-center justify-center text-[1.5rem] font-bold tabular-nums ${scoreShape} ${
                          displayStrokes != null
                            ? (vsPar != null && vsPar < 0
                              ? 'text-primary'
                              : vsPar != null && vsPar > 0
                                ? 'text-error'
                                : 'text-primary')
                            : 'rounded-2xl border border-dashed border-primary/20 text-on-surface-variant/35 bg-surface-container-low/50'
                        } ${displayStrokes != null && !scoreShape ? 'rounded-2xl bg-surface-container-low' : ''}`}
                      >
                        {displayStrokes != null ? displayStrokes : '—'}
                      </div>
                    </div>
                  </button>
                </li>
              );
            })}
          </ul>
        </section>

        <details className="score-sheet rounded-xl overflow-hidden group">
          <summary className="list-none cursor-pointer px-3.5 py-3 flex items-center justify-between text-[12px] font-semibold text-on-surface-variant select-none">
            <span>Scorecard</span>
            <span className="material-symbols-outlined text-lg text-on-surface-variant group-open:rotate-180 transition-transform">expand_more</span>
          </summary>
          <div className="border-t border-primary/10">
          <div className="overflow-x-auto hide-scrollbar min-w-0">
              <table className="w-full text-left border-collapse min-w-[700px]">
                <thead>
                  <tr className="bg-primary text-[#f8f9fa] font-label text-[10px] uppercase tracking-[0.15em]">
                    <th className="py-3 px-3 font-bold sticky left-0 bg-primary z-20 min-w-[96px] shadow-[4px_0_12px_-4px_rgba(0,0,0,0.2)]">Hole</th>
                    {holes.map(h => {
                      const isLive = Number(h.hole_number) === Number(liveHoleNum);
                      const isView = Number(h.hole_number) === Number(viewHoleNum);
                      return (
                      <th
                        key={h.hole_number}
                        className={`py-2 px-1 font-bold text-center min-w-[40px] ${
                          isView ? 'bg-secondary text-on-secondary-fixed'
                            : isLive ? 'bg-secondary/50 text-on-secondary-fixed'
                              : ''
                        }`}
                      >
                        <button
                          type="button"
                          onClick={() => browseHole(h.hole_number)}
                          className={`w-full min-h-[2.25rem] rounded-md font-bold tabular-nums ${
                            isView || isLive
                              ? 'text-on-secondary-fixed'
                              : 'text-inherit hover:bg-white/10'
                          }`}
                          aria-label={`View hole ${h.hole_number}`}
                        >
                          {h.hole_number}
                        </button>
                      </th>
                      );
                    })}
                    <th className="py-4 px-3 font-bold text-center bg-primary-container min-w-[40px]">OUT</th>
                    <th className="py-4 px-3 font-bold text-center bg-primary-container min-w-[40px]">IN</th>
                    <th className="py-4 px-3 font-bold text-center bg-secondary min-w-[40px]">
                      {matchIsStampede ? (
                        <span className="inline-flex flex-col items-center leading-tight">
                          <span>PTS</span>
                          <span className="text-[8px] font-bold opacity-90 normal-case tracking-normal max-w-[4.5rem]">
                            −quota + pts
                          </span>
                        </span>
                      ) : (
                        'TOT'
                      )}
                    </th>
                  </tr>
                </thead>
                <tbody className="font-label text-sm">
                  {/* Par row */}
                  <tr className="bg-surface-container font-bold text-on-surface-variant/70 text-[10px] uppercase tracking-wider">
                    <td className="py-2 px-4 sticky left-0 z-20 bg-surface-container shadow-[4px_0_12px_-4px_rgba(25,28,29,0.12)]">Par</td>
                    {holes.map(h => (
                      <td key={h.hole_number} className="py-2 px-2 text-center">{h.par}</td>
                    ))}
                    <td className="py-2 px-3 text-center">{front9.reduce((s, h) => s + h.par, 0)}</td>
                    <td className="py-2 px-3 text-center">{back9.reduce((s, h) => s + h.par, 0)}</td>
                    <td className="py-2 px-3 text-center">{matchIsStampede ? '—' : holes.reduce((s, h) => s + h.par, 0)}</td>
                  </tr>
                  {/* Yardage row — solid bg on row + sticky cell so horizontal scroll doesn’t bleed through */}
                  <tr className="bg-surface-container-low text-on-surface-variant/50 text-[9px] tracking-wider">
                    <td className="py-1 px-4 sticky left-0 z-20 bg-surface-container-low shadow-[4px_0_12px_-4px_rgba(25,28,29,0.12)]">
                      {unifiedTeeLabel ? (
                        <span className="inline-flex flex-wrap items-baseline gap-x-1 gap-y-0 leading-snug">
                          <span className="text-[9px] font-bold uppercase tracking-wider text-on-surface-variant/80 shrink-0">YDS</span>
                          <span className="text-on-surface-variant/50 font-bold select-none" aria-hidden>
                            ·
                          </span>
                          <span className="text-[11px] font-extrabold text-primary normal-case tracking-tight">
                            {unifiedTeeLabel}
                          </span>
                        </span>
                      ) : (
                        'YDS'
                      )}
                    </td>
                    {holes.map(h => (
                      <td key={h.hole_number} className="py-1 px-2 text-center">{h.yardage}</td>
                    ))}
                    <td className="py-1 px-3 text-center">{front9.reduce((s, h) => s + (h.yardage || 0), 0)}</td>
                    <td className="py-1 px-3 text-center">{back9.reduce((s, h) => s + (h.yardage || 0), 0)}</td>
                    <td className="py-1 px-3 text-center">{holes.reduce((s, h) => s + (h.yardage || 0), 0)}</td>
                  </tr>
                  <tr className="bg-surface-container-high text-on-surface-variant/40 text-[9px] tracking-wider border-b-2 border-primary/10">
                    <td className="py-1 px-4 sticky left-0 z-20 bg-surface-container-high shadow-[4px_0_12px_-4px_rgba(25,28,29,0.12)]">HCP</td>
                    {holes.map(h => (
                      <td key={h.hole_number} className="py-1 px-2 text-center">{h.handicap}</td>
                    ))}
                    <td className="py-1 px-3"></td><td className="py-1 px-3"></td><td className="py-1 px-3"></td>
                  </tr>

                  {/* Player rows */}
                  {scoreboardPlayers.map((player, idx) => {
                    const isMe = player.user_id === user?.id;
                    const netByHole = player.net_strokes_by_hole || player.netStrokesByHole || {};
                    const inBet = player.in_on_bet !== false && player.inOnBet !== false;
                    const strkVsLow = Number(player.strokes_off_leader ?? player.strokesOffLeader) || 0;
                    const playedAny = (player.holes || []).some((s) => s.strokes != null);
                    const stQ = player.stampede_quota ?? player.stampedeQuota;
                    return (
                      <tr key={player.user_id} className={`${isMe ? 'bg-primary/[0.03]' : 'bg-surface'} hover:bg-surface-container-low transition-colors group border-b border-surface-container`}>
                        <td className={`py-3 px-4 align-middle font-bold sticky left-0 z-20 min-w-[140px] max-w-[220px] shadow-[4px_0_12px_-4px_rgba(25,28,29,0.08)] ${isMe ? 'text-primary bg-primary/[0.03] group-hover:bg-surface-container-low' : 'text-on-surface bg-surface group-hover:bg-surface-container-low'}`}>
                          <div className="flex flex-col gap-1.5">
                            <div className="flex flex-wrap items-center gap-x-2 gap-y-1">

/** All tee sets for the course, longest yardage first. */
function getTeesSortedByDistance(teeSets) {
  return [...(teeSets || [])].sort(
    (a, b) => (Number(b.total_yards) || 0) - (Number(a.total_yards) || 0)
  );
}

function formatTeeRatingLine(t) {
  if (!t) return '';
  const par = t.par_total ?? '—';
  const slope = t.slope_rating ?? '—';
  let cr = t.course_rating;
  if (typeof cr === 'number' && Number.isFinite(cr)) {
    cr = Math.round(cr * 10) / 10;
    cr = Number.isInteger(cr) ? String(cr) : cr.toFixed(1);
  }
  return `Par ${par} · ${cr}/${slope}`;
}

/**
 * Course handicap (USGA): Handicap Index × (Slope / 113) + (Course Rating − Par), rounded.
 * Matches server `store.courseHandicap`.
 */
function courseHandicapFromTee(handicapIndex, tee) {
  const idx = Number(handicapIndex);
  if (!Number.isFinite(idx)) return 0;
  if (!tee) return Math.round(idx);
  const slope = Number(tee.slope_rating);
  const cr = Number(tee.course_rating);
  const par = Number(tee.par_total);
  if (!Number.isFinite(slope) || !Number.isFinite(cr) || !Number.isFinite(par)) {
    return Math.round(idx);
  }
  return Math.round(idx * (slope / 113) + (cr - par));
}

/** Net: strokes vs player with lowest course handicap for their tee (editable in confirm modal). */
function rosterApplyNetStrokesOffLeader(rows, getTeeById) {
  const resolve = typeof getTeeById === 'function' ? getTeeById : () => null;
  const withCh = rows.map((r) => ({
    ...r,
    _ch: courseHandicapFromTee(r.handicap, resolve(r.teeSetId)),
  }));
  const chs = withCh.map((x) => x._ch).filter((h) => Number.isFinite(h));
  const leaderCh = chs.length ? Math.min(...chs) : 0;
  return withCh.map((r) => {
    const { _ch, ...rest } = r;
    return {
      ...rest,
      strokesOffLeader: Math.max(0, _ch - leaderCh),
    };
  });
}

/** Stampede starting quota from handicap index (~30 scratch, ~20 at 10 hcp). */
function defaultStampedeQuota(handicapIndex) {
  const h = Number(handicapIndex);
  const h0 = Number.isFinite(h) ? h : 18;
  return Math.max(8, Math.min(45, Math.round(30 - h0)));
}
