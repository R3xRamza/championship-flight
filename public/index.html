  const [confirmScoringMode, setConfirmScoringMode] = useState('gross');
  const [rosterDraft, setRosterDraft] = useState([]);
  const [submittingMatch, setSubmittingMatch] = useState(false);
  const SETUP_STEPS = [
    { id: 'course', label: 'Course' },
    { id: 'players', label: 'Players' },
    { id: 'game', label: 'Game' },
  ];
  const [setupStep, setSetupStep] = useState('course');
  const { user } = useAuth();

  const newSubClientId = () =>
    (typeof crypto !== 'undefined' && crypto.randomUUID
      ? crypto.randomUUID()
      : `sub-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`);

  useEffect(() => {
    if (location.pathname !== '/new-match') return;
    setSetupStep('course');
  }, [location.pathname, location.key]);

  useEffect(() => {
    if (location.pathname !== '/new-match') return;
    let cancelled = false;
    (async () => {
      try {
        const [c, u] = await Promise.all([API.getCourses(), API.getUsers()]);
        if (cancelled) return;
        setCourses(c);
        setUsers(u.filter((x) => x.id !== user.id));
        if (c.length === 0) return;
        const prev = selectedCourse;
        const next =
          prev?.id != null ? c.find((x) => x.id === prev.id) || c[0] : c[0];
        setSelectedCourse(next);
        const sortedTees = getTeesSortedByDistance(next.tee_sets);
        setSelectedTee(sortedTees[0] || null);
      } catch (e) {
        console.error(e);
      }
    })();
    return () => { cancelled = true; };
  }, [user?.id, location.pathname]);

  // Always read tee_sets from the matching row in `courses` (same id as selectedCourse) so lists match the latest API payload.
  const teeOptions = useMemo(() => {
    const course =
      selectedCourse?.id != null
        ? courses.find((x) => x.id === selectedCourse.id)
        : null;
    const sets = course?.tee_sets ?? selectedCourse?.tee_sets;
    return getTeesSortedByDistance(sets);
  }, [courses, selectedCourse?.id]);

  const getTeeOptionById = useCallback(
    (id) => (id ? teeOptions.find((t) => t.id === id) || null : null),
    [teeOptions]
  );

  useEffect(() => {
    if (!teeOptions.length) {
      if (selectedTee) setSelectedTee(null);
      return;
    }
    if (!selectedTee || !teeOptions.some((t) => t.id === selectedTee.id)) {
      setSelectedTee(teeOptions[0]);
    }
  }, [teeOptions, selectedCourse?.id]);

  useEffect(() => {
    if (!teeMenuOpen) return;
    const onDoc = (e) => {
      if (teeDropdownRef.current && !teeDropdownRef.current.contains(e.target)) {
        setTeeMenuOpen(false);
      }
    };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [teeMenuOpen]);

  useEffect(() => {
    if (!courseMenuOpen) return;
    const onDoc = (e) => {
      if (courseDropdownRef.current && !courseDropdownRef.current.contains(e.target)) {
        setCourseMenuOpen(false);
      }
    };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [courseMenuOpen]);

  const openSubModal = () => {
    setSubDraftName('');
    setSubDraftHcp('18');
    setSubModalOpen(true);
  };

  const confirmAddSub = () => {
    const name = subDraftName.trim();
    if (!name) return;
    let h = Number(subDraftHcp);
    if (!Number.isFinite(h)) h = 18;
    h = Math.max(-10, Math.min(54, Math.round(h * 10) / 10));
    setSubs((prev) => [...prev, { clientId: newSubClientId(), name, handicap: h, selected: true }]);
    setSubModalOpen(false);
  };

  const patchRosterRow = (key, patch) => {
    setRosterDraft((prev) => prev.map((r) => (r.key === key ? { ...r, ...patch } : r)));
  };

  const openStartConfirm = () => {
    if (!selectedCourse || !user?.id) return;
    const defTee = selectedTee?.id || teeOptions[0]?.id || null;
    const rows = [];
    const meName =
      (user.display_name && String(user.display_name).trim()) ||
      (user.email && String(user.email).split('@')[0]) ||
      'You';
    rows.push({
      key: user.id,
      userId: user.id,
      isGuest: false,
      displayName: meName,
      avatar_url: user.avatar_url || null,
      handicap: Number(user.handicap_index) || 0,
      teeSetId: defTee,
      strokesOffLeader: 0,
      stampedeQuota: defaultStampedeQuota(user.handicap_index),
      inOnBet: true,
    });
    for (const id of selectedPlayers) {
      const u = users.find((x) => String(x.id) === String(id));
      if (!u) continue;
      const friendName =
        (u.display_name && String(u.display_name).trim()) ||
        (u.email && String(u.email).split('@')[0]) ||
        'Golfer';
      rows.push({
        key: id,
        userId: id,
        isGuest: false,
        displayName: friendName,
        avatar_url: u.avatar_url || null,
        handicap: Number(u.handicap_index) || 0,
        teeSetId: defTee,
        strokesOffLeader: 0,
        stampedeQuota: defaultStampedeQuota(u.handicap_index),
        inOnBet: true,
      });
    }
    for (const s of subs.filter((x) => x.selected)) {
      rows.push({
        key: s.clientId,
        userId: null,
        isGuest: true,
        displayName: s.name,
        avatar_url: null,
        handicap: Number(s.handicap) || 0,
        teeSetId: defTee,
        strokesOffLeader: 0,
        stampedeQuota: defaultStampedeQuota(s.handicap),
        inOnBet: true,
      });
    }
    const isTeamsFmt = String(gameType || '').toLowerCase() === 'teams';
    if (isTeamsFmt) {
      rows.forEach((r, i) => {
        r.teamIndex = (i % 2) + 1;
      });
    }
    setRosterDraft(rosterApplyNetStrokesOffLeader(rows, getTeeOptionById));
    setConfirmScoringMode('net');
    setStartConfirmOpen(true);
  };

  const submitConfirmedMatch = async () => {
    if (!selectedCourse || submittingMatch || !user?.id) return;
    const w = Number(wagerAmount);
    const gt = String(gameType || '').toLowerCase();
    const potBet =
      Number.isFinite(w) &&
      w > 0 &&
      ['skins', 'match_play', 'stroke_play', 'nassau', 'stampede', 'teams'].includes(gt);
    if (potBet && rosterDraft.every((r) => r.inOnBet === false)) {
      window.alert('At least one player must be in on the bet when a wager is set.');
      return;
    }
    const gtLower = String(gameType || '').toLowerCase();
    if (gtLower === 'teams') {
      if (rosterDraft.length < 2) {
        window.alert('Teams format needs at least two golfers.');
        return;
      }
      const t1 = rosterDraft.filter((r) => Number(r.teamIndex) === 1).length;
      const t2 = rosterDraft.filter((r) => Number(r.teamIndex) === 2).length;
      if (t1 < 1 || t2 < 1) {
        window.alert('Teams format needs at least one player on Team 1 and one on Team 2.');
        return;
      }
    }
    const othersInRoster = rosterDraft.filter(
      (r) => !r.isGuest && r.userId != null && String(r.userId) !== String(user.id)
    );
    if (selectedPlayers.size > 0 && othersInRoster.length === 0) {
      window.alert(
        'Selected partners were not added to this match. Close the setup sheet, tap “Head to the First Tee” again, and confirm everyone appears before starting.'
      );
      return;
    }
    setSubmittingMatch(true);
    try {
      const isStampedeMatch = String(gameType || '').toLowerCase() === 'stampede';
      const scoringModeToSend = isStampedeMatch ? 'net' : confirmScoringMode;
      await API.createMatch({
        courseId: selectedCourse.id,
        teeSetId: selectedTee?.id,
        name: matchName || `Match at ${selectedCourse.name}`,
        scoringMode: scoringModeToSend,
        playerSetup: rosterDraft.map((r) => ({
          guest: r.isGuest,
          userId: r.isGuest ? undefined : r.userId,
          user_id: r.isGuest ? undefined : r.userId,
          displayName: r.isGuest ? r.displayName : undefined,
          handicapIndex: r.isGuest ? r.handicap : undefined,
          handicapAtMatch: r.handicap,
          teeSetId: r.teeSetId || selectedTee?.id,
          strokesOffLeader: scoringModeToSend === 'net' ? r.strokesOffLeader : undefined,
          stampedeQuota: isStampedeMatch ? r.stampedeQuota : undefined,
          inOnBet: r.inOnBet !== false,
          ...(String(gameType || '').toLowerCase() === 'teams'
            ? { teamIndex: Number(r.teamIndex) === 2 ? 2 : 1 }
            : {}),
        })),
        gameType,
        wagerAmount,
        junkEnabled: includeJunk,
        junkAmount: includeJunk ? junkAmount : 0,
      });
      setStartConfirmOpen(false);
      navigate('/scorecard');
    } catch (e) {
      console.error(e);
      window.alert(e.message || 'Could not start match');
    }
    setSubmittingMatch(false);
  };

  const gameTypes = [
    {
      id: 'skins',
      label: 'Skins',
      wager: 'Sole low gross wins the hole; each other In player who posted pays the stake plus an equal share of carry. Tie for low gross is a push: carry grows by (everyone on this skins bet − 1) × stake; ties get nothing.',
    },
    {
      id: 'match_play',
      label: 'Match Play',
      wager: 'Each hole: anyone not tied for low gross pays this $; tied lows split what losers put in.',
    },
    {
      id: 'stroke_play',
      label: 'Stroke Play',
      wager: 'After 18: anyone not tied for lowest total pays this $; tied leaders split the pool.',
    },
    {
      id: 'nassau',
      label: 'Nassau',
      wager: 'This $ applies to front 9, back 9, and full 18 separately—same pay/split as stroke play, three times.',
    },
    {
      id: 'stampede',
      label: 'Stampede',
      wager:
        'Modified Stableford: earn points vs your starting quota (default ~30 scratch, ~20 at 10 index). Double bogey+ 0 · bogey 1 · par 2 · birdie 4 · eagle 8 · albatross+ 16 · hole-in-one 25. With a wager, highest total points after 18 wins the pool (ties split).',
    },
    {
      id: 'teams',
      label: 'Teams',
      wager:
        'Two sides (Team 1 / Team 2). Each hole compares the teams’ best balls (lowest counting score among teammates — gross or net to match the round). With a wager, it is best-ball team match play: the winning side splits what the losing side puts in ($ per losing player who posted, same split as individual match play). Halved holes (tie on best ball) are a push. Use the confirm sheet to assign T1 / T2.',
    },
  ];
  const selectedGameHelp = gameTypes.find((g) => g.id === gameType) || gameTypes[0];
  const setupIsStampede = String(gameType || '').toLowerCase() === 'stampede';
  const setupIsTeams = String(gameType || '').toLowerCase() === 'teams';

  const potBetActive = useMemo(() => {
    const w = Number(wagerAmount);
    if (!Number.isFinite(w) || w <= 0) return false;
    const gt = String(gameType || '').toLowerCase();
    return ['skins', 'match_play', 'stroke_play', 'nassau', 'stampede', 'teams'].includes(gt);
  }, [wagerAmount, gameType]);

  const friendUsers = users.filter((u) => u.is_friend);
  const otherUsers = users.filter((u) => !u.is_friend);
  const setupStepIndex = SETUP_STEPS.findIndex((s) => s.id === setupStep);
  const setupStepMeta = SETUP_STEPS[setupStepIndex] || SETUP_STEPS[0];
  const canAdvanceCourse = !!selectedCourse && !!selectedTee;
  const goSetupNext = () => {
    if (setupStep === 'course') {
      if (!canAdvanceCourse) return;
      setSetupStep('players');
      return;
    }
    if (setupStep === 'players') {
      setSetupStep('game');
      return;
    }
    openStartConfirm();
  };
  const goSetupBack = () => {
    if (setupStep === 'players') setSetupStep('course');
    else if (setupStep === 'game') setSetupStep('players');
    else navigate('/');
  };

  return (
    <div className="bg-surface text-on-surface min-h-[100dvh]">
      <TopHeader title="New Round" backTo="/" />
      <main className="page-pad phone-page px-4 space-y-4" style={{ paddingBottom: 'calc(var(--nav-h) + 5.5rem)' }}>
        <section className="rise-in space-y-3">
          <div>
            <h2 className="font-headline italic text-[1.65rem] text-primary leading-tight">
              {setupStep === 'course' && 'Course'}
              {setupStep === 'players' && 'Players'}
              {setupStep === 'game' && 'Game'}
            </h2>
            <p className="text-[13px] text-on-surface-variant mt-1">
              {setupStep === 'course' && 'Name the round, pick a course and tee.'}
              {setupStep === 'players' && 'You’re always in. Add partners and guests.'}
              {setupStep === 'game' && 'Choose the format, wager, and junk.'}
            </p>
          </div>
          <nav className="grid grid-cols-3 gap-1.5" aria-label="Setup steps">
            {SETUP_STEPS.map((s, i) => {
              const active = s.id === setupStep;
              const done = i < setupStepIndex;
              const reachable = i <= setupStepIndex || (canAdvanceCourse && i <= setupStepIndex + 1);
              return (
                <button
                  key={s.id}
                  type="button"
                  disabled={!reachable && !done && !active}
                  onClick={() => {
                    if (i > 0 && !canAdvanceCourse) return;
                    if (i > setupStepIndex + 1) return;
                    setSetupStep(s.id);
                  }}
                  className={`rounded-lg py-2 px-1 text-center transition-colors disabled:opacity-40 ${
                    active
                      ? 'bg-primary text-white'
                      : done
                        ? 'bg-primary/10 text-primary'
                        : 'bg-white border border-primary/10 text-on-surface-variant'
                  }`}
                >
                  <span className="block text-[10px] font-bold uppercase tracking-wider opacity-80">{i + 1}</span>
                  <span className="block text-[12px] font-bold mt-0.5">{s.label}</span>
                </button>
              );
            })}
          </nav>
        </section>

        <div className="space-y-5">
          {setupStep === 'course' && (
            <section className="score-sheet rounded-xl p-4 space-y-4 rise-in">
              <div>
                <label className="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant block mb-2" htmlFor="match-name">
                  Match name
                </label>
                <input
                  id="match-name"
                  className="w-full rounded-lg border border-primary/12 bg-white px-3.5 py-3 text-[15px] font-semibold text-primary placeholder:text-on-surface-variant/45 focus:outline-none focus:ring-2 focus:ring-primary/20"
                  placeholder="Saturday Skins"
                  value={matchName}
                  onChange={(e) => setMatchName(e.target.value)}
                />
              </div>

              <div>
                <p className="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Course</p>
                <div className="relative" ref={courseDropdownRef}>
                  <button
                    type="button"
                    onClick={() => courses.length && setCourseMenuOpen((o) => !o)}
                    disabled={!courses.length}
                    className={`w-full text-left rounded-lg border px-3.5 py-3 pr-10 transition-colors ${
                      courseMenuOpen
                        ? 'border-primary bg-primary/[0.04] ring-2 ring-primary/15'
                        : 'border-primary/12 bg-white'
                    } ${!courses.length ? 'opacity-50 cursor-not-allowed' : ''}`}
                  >
                    {selectedCourse ? (
                      <span className="block text-[15px] font-semibold text-primary leading-snug whitespace-normal break-words [overflow-wrap:anywhere]">
                        {selectedCourse.name}
                      </span>
                    ) : (
                      <span className="text-[14px] text-on-surface-variant">Select a course</span>
                    )}
                    <span className={`material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant transition-transform ${courseMenuOpen ? 'rotate-180' : ''}`}>
                      expand_more
                    </span>
                  </button>
                  {courseMenuOpen && courses.length > 0 && (
                    <ul className="absolute z-[200] left-0 right-0 mt-1.5 max-h-64 overflow-y-auto rounded-lg border border-primary/12 bg-white shadow-lg py-1" role="listbox">
                      {courses.map((c) => {
                        const sel = selectedCourse?.id === c.id;
                        return (
                          <li key={c.id} role="option" aria-selected={sel}>
                            <button
                              type="button"
                              onClick={() => {
                                setSelectedCourse(c);
                                const mt = getTeesSortedByDistance(c?.tee_sets);
                                setSelectedTee(mt[0] || null);
                                setCourseMenuOpen(false);
                                setTeeMenuOpen(false);
                              }}
                              className={`w-full text-left px-3.5 py-3 text-[14px] font-semibold leading-snug break-words [overflow-wrap:anywhere] ${
                                sel ? 'bg-primary text-white' : 'text-primary hover:bg-surface-container-low'
                              }`}
                            >
                              {c.name}
                            </button>
                          </li>
                        );
                      })}
                    </ul>
                  )}
                </div>
              </div>

              <div>
                <p className="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Tee</p>
                <div className="relative" ref={teeDropdownRef}>
                  <button
                    type="button"
                    onClick={() => teeOptions.length && setTeeMenuOpen((o) => !o)}
                    disabled={!teeOptions.length}
                    className={`w-full text-left rounded-lg border px-3.5 py-3 pr-10 transition-colors ${
                      teeMenuOpen
                        ? 'border-primary bg-primary/[0.04] ring-2 ring-primary/15'
                        : 'border-primary/12 bg-white'
                    } ${!teeOptions.length ? 'opacity-50 cursor-not-allowed' : ''}`}
                  >
                    {selectedTee ? (
                      <>
                        <span className="block text-[15px] font-semibold text-primary leading-snug">
                          {selectedTee.tee_name}
                          <span className="font-medium text-on-surface-variant"> · {selectedTee.total_yards} yds</span>
                        </span>
                        <span className="block text-[12px] text-on-surface-variant mt-0.5 font-medium">
                          {formatTeeRatingLine(selectedTee)}
                        </span>
                      </>
                    ) : (
                      <span className="text-[14px] text-on-surface-variant">No tees for this course</span>
                    )}
                    <span className={`material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant transition-transform ${teeMenuOpen ? 'rotate-180' : ''}`}>
                      expand_more
                    </span>
                  </button>
                  {teeMenuOpen && teeOptions.length > 0 && (
                    <ul className="absolute z-[200] left-0 right-0 mt-1.5 max-h-64 overflow-y-auto rounded-lg border border-primary/12 bg-white shadow-lg py-1" role="listbox">
                      {teeOptions.map((t) => {
                        const sel = selectedTee?.id === t.id;
                        return (
                          <li key={t.id} role="option" aria-selected={sel}>
                            <button
                              type="button"
                              onClick={() => {
                                setSelectedTee(t);
                                setTeeMenuOpen(false);
                              }}
                              className={`w-full text-left px-3.5 py-3 ${
                                sel ? 'bg-primary text-white' : 'hover:bg-surface-container-low'
                              }`}
                            >
                              <span className={`block text-[14px] font-semibold ${sel ? 'text-white' : 'text-primary'}`}>
                                {t.tee_name} · {t.total_yards} yds
                              </span>
                              <span className={`block text-[11px] mt-0.5 ${sel ? 'text-white/75' : 'text-on-surface-variant'}`}>
                                {formatTeeRatingLine(t)}
                              </span>
                            </button>
                          </li>
                        );
                      })}
                    </ul>
                  )}
                </div>
              </div>
            </section>
          )}

          {setupStep === 'players' && (
            <section className="space-y-3 rise-in">
              {friendUsers.length > 0 && (
                <div className="score-sheet rounded-xl overflow-hidden">
                  <p className="px-3.5 pt-3 text-[10px] font-bold uppercase tracking-widest text-secondary">Friends</p>
                  <ul className="divide-y divide-primary/8">
                    {friendUsers.map((u) => {
                      const sid = String(u.id);
                      const selected = [...selectedPlayers].some((x) => String(x) === sid);
                      return (
                        <li key={u.id}>
                          <button
                            type="button"
                            onClick={() => {
                              const next = new Set([...selectedPlayers].map(String));
                              selected ? next.delete(sid) : next.add(sid);
                              setSelectedPlayers(next);
                            }}
                            className={`w-full flex items-center gap-3 px-3.5 py-3 text-left transition-colors ${
                              selected ? 'bg-primary/[0.05]' : 'bg-white'
                            }`}
                          >
                            <div className="w-10 h-10 rounded-full overflow-hidden bg-surface-container flex items-center justify-center text-sm font-bold text-primary shrink-0">
                              {u.avatar_url ? <img className="h-full w-full object-cover" src={u.avatar_url} alt="" /> : u.display_name[0]}
                            </div>
                            <div className="min-w-0 flex-1">
                              <p className="text-[15px] font-semibold text-primary truncate">{u.display_name}</p>
                              <p className="text-[12px] text-on-surface-variant">HCP {u.handicap_index ?? '—'}</p>
                            </div>
                            <span
                              className={`flex h-6 w-6 items-center justify-center rounded-full border ${
                                selected ? 'bg-primary border-primary text-white' : 'border-outline-variant text-transparent'
                              }`}
                            >
                              <span className="material-symbols-outlined text-[16px]" style={{ fontVariationSettings: "'FILL' 1" }}>check</span>
                            </span>
                          </button>
                        </li>
                      );
                    })}
                  </ul>
                </div>
              )}

              {otherUsers.length > 0 && (
                <div className="score-sheet rounded-xl overflow-hidden">
                  <p className="px-3.5 pt-3 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Others</p>
                  <ul className="divide-y divide-primary/8">
                    {otherUsers.map((u) => {
                      const sid = String(u.id);
                      const selected = [...selectedPlayers].some((x) => String(x) === sid);
                      return (
                        <li key={u.id}>
                          <button
                            type="button"
                            onClick={() => {
                              const next = new Set([...selectedPlayers].map(String));
                              selected ? next.delete(sid) : next.add(sid);
                              setSelectedPlayers(next);
                            }}
                            className={`w-full flex items-center gap-3 px-3.5 py-3 text-left ${
                              selected ? 'bg-primary/[0.05]' : 'bg-white'
                            }`}
                          >
                            <div className="w-10 h-10 rounded-full overflow-hidden bg-surface-container flex items-center justify-center text-sm font-bold text-primary shrink-0">
                              {u.avatar_url ? <img className="h-full w-full object-cover" src={u.avatar_url} alt="" /> : u.display_name[0]}
                            </div>
                            <div className="min-w-0 flex-1">
                              <p className="text-[15px] font-semibold text-primary truncate">{u.display_name}</p>
                              <p className="text-[12px] text-on-surface-variant">HCP {u.handicap_index ?? '—'}</p>
                            </div>
                            <span
                              className={`flex h-6 w-6 items-center justify-center rounded-full border ${
                                selected ? 'bg-primary border-primary text-white' : 'border-outline-variant text-transparent'
                              }`}
                            >
                              <span className="material-symbols-outlined text-[16px]" style={{ fontVariationSettings: "'FILL' 1" }}>check</span>
                            </span>
                          </button>
                        </li>
                      );
                    })}
                  </ul>
                </div>
              )}

              {friendUsers.length === 0 && otherUsers.length === 0 && (
                <p className="text-[13px] text-on-surface-variant score-sheet rounded-xl p-4">
                  No other players yet. Add a sub below, or continue solo.
                </p>
              )}

              <div className="score-sheet rounded-xl p-4 space-y-3">
                <div className="flex items-center justify-between gap-3">
                  <div className="min-w-0">
                    <p className="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Subs</p>
                    <p className="text-[12px] text-on-surface-variant mt-0.5">Guests not on Sandbags yet</p>
                  </div>

                    confirmScoringMode === 'net' &&

                    teeOptions.find((t) => t.id === row.teeSetId)?.tee_name ||

                                type="button"
                                onClick={() =>
                                  patchRosterRow(row.key, {
                                    strokesOffLeader: Math.min(54, (Number(row.strokesOffLeader) || 0) + 1),

                                <span className="material-symbols-outlined text-lg">add</span>

                      </div>
                    </div>

              <button
                type="button"
                disabled={submittingMatch || rosterDraft.length === 0}
                onClick={submitConfirmedMatch}
                className="w-full flex items-center justify-between px-6 py-4 bg-primary text-on-primary rounded-xl font-body font-extrabold text-sm uppercase tracking-widest shadow-lg hover:opacity-95 active:scale-[0.99] transition-all disabled:opacity-50"
              >
                <span>{submittingMatch ? 'Starting…' : 'Start match session'}</span>
                <span className="material-symbols-outlined text-lg">arrow_forward</span>
              </button>
            </div>
          </div>
        </div>
      )}

      <BottomNav />
    </div>
  );
};

// LEADERBOARD — mini scorecard (read-only, same grid as match summary)
// ============================================================
function RoundHistoryScorecardMini({ scoreData, user }) {
  const holes = scoreData.holes || [];
  if (!holes.length) {
    return (
      <p className="text-sm text-on-surface-variant p-4 bg-surface-container-low rounded-lg border border-outline-variant/15">
        Hole layout isn&apos;t available for this round; open the full summary for details.
      </p>
    );
  }
  const front9 = holes.filter((h) => h.hole_number <= 9);
  const back9 = holes.filter((h) => h.hole_number > 9);
  const frontParSum = front9.reduce((s, h) => s + h.par, 0);
  const backParSum = back9.reduce((s, h) => s + h.par, 0);
  const parTotal = frontParSum + backParSum;
  const sortedBoard = [...(scoreData.scoreboard || [])].sort((a, b) => {
    if (a.toPar !== b.toPar) return a.toPar - b.toPar;
    return (a.total || 0) - (b.total || 0);
  });
  const strokeFor = (player, holeNum) => {
    const rec = player.holes?.find((s) => s.hole_number === holeNum);
    return rec?.strokes;
  };
  const holeCellClass = (strokes, par) => {
    if (strokes == null) return 'text-on-surface-variant/40';
    const d = strokes - par;
    if (d >= 2) return 'text-error font-bold ring-1 ring-error/25 rounded-full inline-flex items-center justify-center w-6 h-6 mx-auto';
    if (d === 1) return 'text-error font-semibold';
    if (d === 0) return '';
    return 'text-primary font-bold';
  };

  return (
    <div className="bg-surface-container-lowest rounded-xl border border-outline-variant/20 shadow-sm overflow-hidden">
      <div className="overflow-x-auto no-scrollbar">
        <table className="w-full min-w-[560px] border-collapse text-left">
          <thead>
            <tr className="bg-primary text-[#ffe088]">
              <th className="p-2 font-headline text-[10px] tracking-wider uppercase border-r border-white/10 sticky left-0 bg-primary z-10">Hole</th>
              {front9.map((h) => (
                <th key={h.hole_number} className="p-1.5 text-center text-[10px] font-bold border-r border-white/5">{h.hole_number}</th>
              ))}
              <th className="p-1.5 text-center text-[10px] font-bold bg-primary-container text-[#ffe088] border-r border-white/10">OUT</th>
              {back9.map((h) => (
                <th key={h.hole_number} className="p-1.5 text-center text-[10px] font-bold border-r border-white/5">{h.hole_number}</th>
              ))}
              <th className="p-1.5 text-center text-[10px] font-bold bg-primary-container text-[#ffe088] border-r border-white/10">IN</th>
              <th className="p-1.5 text-center text-[10px] font-bold bg-[#735c00] text-[#ffe088] border-r border-white/10">TOT</th>
              <th className="p-1.5 text-center text-[10px] font-bold bg-[#735c00]/90 text-[#ffe088]">+ / −</th>
            </tr>
            <tr className="bg-surface-container text-on-surface-variant">
              <td className="p-1.5 text-[10px] font-bold uppercase tracking-tighter border-r border-outline-variant/20 sticky left-0 bg-surface-container z-10">Par</td>
              {front9.map((h) => (
                <td key={h.hole_number} className="p-1 text-center text-[10px]">{h.par}</td>
              ))}
              <td className="p-1 text-center text-[10px] font-bold bg-surface-container-high border-r border-outline-variant/20">{frontParSum}</td>
              {back9.map((h) => (
                <td key={h.hole_number} className="p-1 text-center text-[10px]">{h.par}</td>
              ))}
              <td className="p-1 text-center text-[10px] font-bold bg-surface-container-high border-r border-outline-variant/20">{backParSum}</td>
              <td className="p-1 text-center text-[10px] font-bold bg-secondary-fixed/30 border-r border-outline-variant/20">{parTotal}</td>
              <td className="p-1 text-center text-[10px]">—</td>
            </tr>
          </thead>
          <tbody className="text-primary font-body text-sm">
            {sortedBoard.map((player) => {
              const isMe = player.user_id === user?.id;
              return (
                <tr key={player.user_id} className={`border-b border-outline-variant/10 ${isMe ? 'bg-secondary-fixed/10' : ''}`}>
                  <td className={`p-2 text-xs font-bold border-r border-outline-variant/20 sticky left-0 z-10 max-w-[120px] truncate ${isMe ? 'bg-[#fffcf0] border-r border-secondary-fixed/30' : 'bg-white'}`}>
                    {player.display_name}{isMe ? ' (You)' : ''}
                  </td>
                  {front9.map((h) => {
                    const st = strokeFor(player, h.hole_number);
                    return (
                      <td key={h.hole_number} className="p-1 text-center text-xs border-r border-outline-variant/5">
                        <span className={holeCellClass(st, h.par)}>{st != null ? st : '—'}</span>
                      </td>
                    );
                  })}
                  <td className="p-1 text-center text-xs font-bold bg-surface-container-high/80 border-r border-outline-variant/20">{player.front9 || '—'}</td>
                  {back9.map((h) => {
                    const st = strokeFor(player, h.hole_number);
                    return (
                      <td key={h.hole_number} className="p-1 text-center text-xs border-r border-outline-variant/5">
                        <span className={holeCellClass(st, h.par)}>{st != null ? st : '—'}</span>
                      </td>
                    );
                  })}
                  <td className="p-1 text-center text-xs font-bold bg-surface-container-high/80 border-r border-outline-variant/20">{player.back9 || '—'}</td>
                  <td className="p-1 text-center text-xs font-bold bg-secondary-fixed/20 border-r border-outline-variant/20">{player.total || '—'}</td>
                  <td className="p-1 text-center text-xs font-bold">
                    {player.toPar == null ? '—' : player.toPar === 0 ? 'E' : player.toPar > 0 ? `+${player.toPar}` : player.toPar}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

const NewChallengeScreen = () => {
  const navigate = useNavigate();
  const { user } = useAuth();
  const [betType, setBetType] = useState('skins');
  const [amount, setAmount] = useState(5);
  const [matchId, setMatchId] = useState(null);
  const [match, setMatch] = useState(null);
  const [betScope, setBetScope] = useState('each_hole');
  const [startHole, setStartHole] = useState(1);
  const [junkSaving, setJunkSaving] = useState(false);
  const [junkAmountDraft, setJunkAmountDraft] = useState('1');
  const [junkAmtSaving, setJunkAmtSaving] = useState(false);
  const [placing, setPlacing] = useState(false);
  const [placeError, setPlaceError] = useState(null);
  const [setupStep, setSetupStep] = useState('type');

  const SIDE_BET_STEPS = [
    { id: 'type', label: 'Type' },
    { id: 'stake', label: 'Stake' },
    { id: 'junk', label: 'Junk' },
  ];
  const setupStepIndex = SIDE_BET_STEPS.findIndex((s) => s.id === setupStep);

  useEffect(() => {
    (async () => {
      const matches = await API.getMatches();
      const active = pickActiveMatchForUser(matches, user?.id);
      if (!active) return;
      setMatchId(active.id);
      try {
        const detail = await API.getMatch(active.id);
        setMatch(detail);
      } catch (e) {
        setMatch(active);
      }
    })();
  }, [user?.id]);

  useEffect(() => {
    if (match && match.junk_amount != null) setJunkAmountDraft(String(Number(match.junk_amount) > 0 ? match.junk_amount : 1));
  }, [match?.id, match?.junk_amount]);

  const saveJunkAmount = async () => {
    if (!matchId || junkAmtSaving) return;
    setJunkAmtSaving(true);
    try {
      const v = Math.round(Math.max(0.25, Math.min(500, Number(junkAmountDraft) || 1)) * 100) / 100;
      const detail = await API.updateMatch(matchId, { junkAmount: v });
      setMatch(detail);
    } catch (e) { console.error(e); }
    setJunkAmtSaving(false);
  };

  const toggleJunkForMatch = async () => {
    if (!matchId || junkSaving) return;
    setJunkSaving(true);
    try {
      const next = !isJunkEnabled(match);
      const payload = { junkEnabled: next };
      if (next && !(Number(match?.junk_amount) > 0)) payload.junkAmount = 1;
      const detail = await API.updateMatch(matchId, payload);
      setMatch(detail);
    } catch (e) { console.error(e); }
    setJunkSaving(false);
  };

  useEffect(() => {
    if (match?.current_hole) setStartHole(Math.min(18, Math.max(1, match.current_hole)));
  }, [match?.current_hole, match?.id]);

  const needsHoleScope = () => propBetTypesWithScope().includes(betType);

  useEffect(() => {
    if (!propBetTypesWithScope().includes(betType)) setBetScope('each_hole');
  }, [betType]);

  const betNameForType = (t) => ({
    skins: 'Skins game',
    birdie_bet: 'Birdie bet',
    par_save: 'Par save',
    nassau: 'Nassau',
    match_play: 'Match play',
    stroke_play: 'Stroke play',
    eagle_bet: 'Eagle or better',
    greenie: 'Greenie',
  }[t] || 'Side bet');

  const stakeSummary = () => {
    if (betType === 'nassau') return `$${amount} per leg × 3`;
    if (betType === 'stroke_play') return `$${amount} on full round`;
    return `$${amount} per hole`;
  };

  const scopeSummary = () => {
    if (!needsHoleScope()) return null;
    if (betScope === 'one_hole') return `Hole ${startHole} only`;
    if (betScope === 'rest_of_round') return `Holes ${startHole}–18`;
    return 'Every hole';
  };

  const handleSubmit = async () => {
    if (!matchId || placing) return;
    setPlacing(true);
    setPlaceError(null);
    try {
      const body = {
        betType,
        amount,
        name: betNameForType(betType),
      };
      if (needsHoleScope()) {
        body.betScope = betScope;
        if (betScope === 'one_hole' || betScope === 'rest_of_round') {
          body.holeNumber = startHole;
        }
      }
      await API.createBet(matchId, body);
      navigate('/scorecard');
    } catch (e) {
      console.error(e);
      setPlaceError(e.message || 'Could not place bet');
      setPlacing(false);
    }
  };

  const betTypes = [
    { id: 'skins', label: 'Skins', icon: 'shield', desc: 'Low score wins the hole; ties carry' },
    { id: 'match_play', label: 'Match play', icon: 'handshake', desc: 'Win the hole, opponents pay' },
    { id: 'stroke_play', label: 'Stroke play', icon: 'golf_course', desc: 'Lowest 18-hole total wins' },
    { id: 'nassau', label: 'Nassau', icon: 'sports_score', desc: 'Front, back, and overall' },

                <ul className="divide-y divide-primary/8">
                  {[
                    { id: 'each_hole', label: 'Every hole', sub: 'Settles each hole while active' },

                {(betScope === 'one_hole' || betScope === 'rest_of_round') && (
                  <div className="px-4 py-3.5 border-t border-primary/8">

                      })}
                    </div>
                    {match?.current_hole != null && (

                      </p>
                    )}
                  </div>
                )}
              </section>
            )}
          </div>
        )}

        {matchId && setupStep === 'junk' && (
          <div className="space-y-4 rise-in">
            <section className="score-sheet rounded-xl p-4 space-y-2">
              <p className="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Ready to place</p>
              <p className="font-headline italic text-[1.5rem] text-primary leading-tight">{selectedBet.label}</p>
              <p className="text-[14px] font-semibold text-primary tabular-nums">{stakeSummary()}</p>
              {scopeSummary() && (
                <p className="text-[13px] text-on-surface-variant">{scopeSummary()}</p>
              )}
            </section>

            <section className="score-sheet rounded-xl overflow-hidden">
              <button
                type="button"
                disabled={junkSaving || !matchId}
                onClick={toggleJunkForMatch}

                <span className="min-w-0 flex-1">
                  <span className="block text-[15px] font-semibold text-primary">Junk &amp; side marks</span>
                  <span className="block text-[12px] text-on-surface-variant mt-0.5 leading-snug">

                  </span>
                </span>
                <span className={`shrink-0 text-[11px] font-bold uppercase tracking-wide px-2.5 py-1 rounded-md ${

              </button>
              <div className="border-t border-primary/8 px-4 py-3.5 space-y-3">
                <div>
                  <label className="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant block mb-1">

                  </p>

                    <span className="text-primary font-bold">$</span>
                    <input
                      type="number"
                      min="0.25"
                      step="0.25"

                      value={junkAmountDraft}

                    />
                    <button
                      type="button"
                      disabled={junkAmtSaving}

                      className="px-3.5 py-2.5 rounded-lg text-[12px] font-bold bg-primary text-white disabled:opacity-50"
                    >

                      <button
                        key={v}

                            : 'bg-surface-container text-primary'

                      >

                      </button>
                    ))}

                </div>
              </div>

            {placeError && (
              <p className="text-[13px] text-error font-semibold px-1">{placeError}</p>

      </main>

      {matchId && (
        <div
          className="fixed inset-x-0 z-40 border-t border-primary/10 bg-[rgba(243,247,244,0.97)] backdrop-blur-md px-4 pt-2.5"

        >

              {primaryLabel}

      <BottomNav />

};

const MatchSummaryScreen = () => {
  const { matchId } = useParams();
  const navigate = useNavigate();
  const { user } = useAuth();
  const [match, setMatch] = useState(null);
  const [scoreData, setScoreData] = useState(null);
  const [bets, setBets] = useState([]);
  const [err, setErr] = useState(null);
  const [summaryScoringMode, setSummaryScoringMode] = useState('gross');

  useEffect(() => {
    (async () => {
      try {
        const m = await API.getMatch(matchId);
        const [s, bRaw] = await Promise.all([
          API.getScores(matchId),
          API.getBets(matchId).catch(() => null),
        ]);
        const arr = Array.isArray(bRaw) ? bRaw : [];
        const fromMatch = Array.isArray(m?.bets) ? m.bets : [];
        const merged = arr.length > 0 ? arr : fromMatch;
        setMatch(m);
        setScoreData(s);
        setBets(merged);
        const sm = m?.scoring_mode === 'net' || m?.scoringMode === 'net';
        setSummaryScoringMode(sm ? 'net' : 'gross');
      } catch (e) {
        setErr(e.message || String(e));
      }
    })();
  }, [matchId]);

  const initials = (name) => {
    if (!name) return '?';
    const parts = String(name).trim().split(/\s+/);
    if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    return name.slice(0, 2).toUpperCase();
  };

  const formatToPar = (toPar) => {
    if (toPar == null || toPar === '') return '—';
    if (toPar > 0) return `+${toPar}`;
    if (toPar === 0) return 'E';
    return String(toPar);
  };

  const shareResults = async () => {
    const url = window.location.href;
    const title = match?.name || 'Round complete';
    try {
      if (navigator.share) await navigator.share({ title, text: `Sandbags — ${title}`, url });
      else await navigator.clipboard.writeText(url);
    } catch (e) {
      if (e?.name !== 'AbortError') console.error(e);
    }
  };

  if (err) {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center px-6 pb-24">
        <p className="text-error mb-4">{err}</p>
        <button onClick={() => navigate('/')} className="bg-primary text-on-primary px-6 py-3 rounded-md font-bold">Back to Sandbags</button>
      </div>
    );
  }

  if (!match || !scoreData) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-background">
        <p className="text-on-surface-variant">Loading summary…</p>
      </div>
    );
  }

  const holes = scoreData.holes || [];
  const front9 = holes.filter(h => h.hole_number <= 9);
  const back9 = holes.filter(h => h.hole_number > 9);
  const parTotal = holes.reduce((s, h) => s + h.par, 0);
  const frontParSum = front9.reduce((s, h) => s + h.par, 0);
  const backParSum = back9.reduce((s, h) => s + h.par, 0);

  const gameTypeLc = String(match.game_type || match.gameType || '').toLowerCase();
  const matchIsStampede = gameTypeLc === 'stampede';
  const matchIsTeamsSummary = gameTypeLc === 'teams';
  const matchIsNet = match.scoring_mode === 'net' || match.scoringMode === 'net';
  const netScoreView = matchIsNet && !matchIsStampede && summaryScoringMode === 'net';
  const skinsBet = bets.find(b => b.bet_type === 'skins');

  const boardForRank = scoreData.scoreboard || [];
  const showInOutBadgesSummary =
    boardForRank.length > 0
    && boardForRank.some(playerInOnBetRow)
    && boardForRank.some((p) => !playerInOnBetRow(p));

  const sortedBoard = [...boardForRank].sort((a, b) =>
    compareScoreboardByGame(a, b, { matchIsStampede, matchIsNet, netScoreView })
  );

  const displayBoard = orderScoreboardPlayers(boardForRank, user?.id, {
    matchIsStampede,
    matchIsNet,
    netScoreView,
    matchIsTeams: matchIsTeamsSummary,
  });

  const summaryTeamBestRows = scoreData.team_best_ball || scoreData.teamBestBall || [];
  const mainSkinsBet = gameTypeLc === 'skins' ? skinsBet : null;
  let heroWinner = sortedBoard[0] || null;
  if (mainSkinsBet?.participants?.length) {
    const ranked = [...mainSkinsBet.participants].sort(
      (a, b) => (Number(b.net_result) || 0) - (Number(a.net_result) || 0)
    );
    const top = ranked[0];
    if (top) {
      const row = boardForRank.find((x) => x.user_id === top.user_id);
      heroWinner = {
        display_name: top.display_name || row?.display_name || '—',
        user_id: top.user_id,
        avatar_url: row?.avatar_url,
      };
    }
  } else if (matchIsTeamsSummary && summaryTeamBestRows.length) {
    const s1 = teamBestSumOverHoles(summaryTeamBestRows, holes, 1);
    const s2 = teamBestSumOverHoles(summaryTeamBestRows, holes, 2);
    if (s1.any && s2.any && s1.sum !== s2.sum) {
      heroWinner = {
        display_name: s1.sum < s2.sum ? 'Team 1 — lower best-ball total' : 'Team 2 — lower best-ball total',
        user_id: null,
        avatar_url: null,
      };
    } else if (s1.any && s2.any) {
      heroWinner = {
        display_name: 'Teams tied (best-ball total)',
        user_id: null,
        avatar_url: null,
      };
    } else {
      heroWinner = null;
    }
  }

  const leaderboardSubtitle = matchIsStampede
    ? 'Stampede points'
    : gameTypeLc === 'skins'
      ? 'Strokes (skins settled separately)'
      : matchIsTeamsSummary
        ? 'Team best ball + individual strokes'
        : netScoreView
          ? 'Net strokes'
          : 'Stroke play';

  const netByUser = {};
  bets.forEach(bet => {
    bet.participants?.forEach(p => {
      netByUser[p.user_id] = (netByUser[p.user_id] || 0) + (Number(p.net_result) || 0);
    });
  });

  const myNet = netByUser[user?.id] || 0;
  const myStakes = bets.map(bet => {
    const p = bet.participants?.find(x => x.user_id === user?.id);
    return {
      label: bet.name || sideBetDisplayName(bet.bet_type),
      sub: propBetTypesWithScope().includes(bet.bet_type) ? formatBetPlacementShort(bet) : null,
      net: Number(p?.net_result) || 0,
    };
  });

  const payoutRows = (match.players || scoreData.scoreboard || []).map(p => ({
    user_id: p.user_id,
    display_name: p.display_name,
    avatar_url: p.avatar_url,
    handicap_index: p.handicap_index,
    net: netByUser[p.user_id] || 0,
  })).sort((a, b) => b.net - a.net);
  const groupPayoutSum = payoutRows.reduce((s, r) => s + r.net, 0);

  const dateStr = match.tee_time
    ? new Date(match.tee_time).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' })
    : '';

  const strokeFor = (player, holeNum) => {
    const rec = player.holes?.find(s => s.hole_number === holeNum);
    return rec?.strokes;
  };

  const effectiveStrokesForSummaryCell = (player, holeNum) => {
    const gross = strokeFor(player, holeNum);
    if (gross == null) return null;
    if (!netScoreView) return gross;
    const netByHole = player.net_strokes_by_hole || player.netStrokesByHole || {};
    const recv = netByHole[holeNum] || netByHole[String(holeNum)] || 0;
    return gross - recv;
  };

  const holeCellClass = (strokes, par) => {
    if (strokes == null) return 'text-on-surface-variant/40';
    const d = strokes - par;
    if (d >= 2) return 'text-error font-bold ring-1 ring-error/25 rounded-full inline-flex items-center justify-center w-6 h-6 mx-auto';
    if (d === 1) return 'text-error font-semibold';
    if (d === 0) return '';
    return 'text-primary font-bold';
  };

  return (
    <div className="bg-background text-on-surface min-h-[100dvh]">
      <TopHeader title="Summary" backTo="/" />

      <main className="page-pad phone-page px-4">
        <section className="mb-6 rise-in">
          <p className="text-[10px] font-bold uppercase tracking-widest text-secondary mb-1">Round complete</p>
          <h2 className="text-2xl font-headline italic text-primary leading-tight">
            {gameTypeLc === 'skins'
              ? (<>Skins · {match.name || match.course_name || 'Round'}</>)
              : matchIsTeamsSummary
                ? (<>Teams · {match.name || match.course_name || 'Round'}</>)
              : matchIsStampede
                ? (<>Stampede · {match.name || match.course_name || 'Round'}</>)
                : (<>{match.name || match.course_name || 'Round'}</>)}
          </h2>
          <p className="text-on-surface-variant font-body text-sm mt-2">
            {holes.length} holes · Par {parTotal}{dateStr ? ` · ${dateStr}` : ''}
            {gameTypeLc === 'skins' && skinsBet && (
              <span className="block mt-1 text-[11px] font-bold text-primary/90">
                Carry ${Number(skinsBet.carry_over || 0).toFixed(2)}
              </span>
            )}
          </p>
          {heroWinner && (
            <p className="mt-2 text-base font-body font-semibold text-primary">{heroWinner.display_name}</p>
          )}
        </section>

        <section className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
          <div className="bg-primary text-white p-6 rounded-xl flex flex-col justify-between shadow-2xl relative overflow-hidden group">
            <div className="absolute -right-4 -top-4 opacity-10 group-hover:rotate-12 transition-transform duration-700">
              <span className="material-symbols-outlined text-[120px]" style={{ fontVariationSettings: "'FILL' 1" }}>payments</span>
            </div>
            <div>
              <h3 className="font-headline text-2xl text-secondary-fixed italic">Your Net Position</h3>
              <p className="font-body text-white/60 text-sm mt-1">Final Settlement</p>
            </div>
            <div className="mt-8">
              <span className={`text-4xl font-headline font-bold ${myNet >= 0 ? 'text-secondary-fixed' : 'text-error'}`}>
                {`${myNet >= 0 ? '+' : '-'}$${Math.abs(myNet).toFixed(2)}`}
              </span>
            </div>
          </div>
          <div className="bg-surface-container-low p-6 rounded-xl border border-outline-variant/15">
            <h3 className="font-headline text-xl text-primary">Settled Stakes</h3>
            <div className="mt-4 space-y-3">
              {myStakes.length === 0 && <p className="text-sm text-on-surface-variant">No wagers on this match.</p>}
              {myStakes.map((row, i) => (
                <div key={i} className="flex justify-between items-start gap-3">
                  <div className="min-w-0">
                    <span className="text-sm font-body text-on-surface block">{row.label}</span>
                    {row.sub && <span className="text-[11px] text-on-surface-variant/90 block mt-0.5">{row.sub}</span>}
                  </div>
                  <span className={`text-sm font-bold shrink-0 ${row.net >= 0 ? 'text-primary' : 'text-error'}`}>
                    {`${row.net >= 0 ? '+' : '-'}$${Math.abs(row.net).toFixed(2)}`}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </section>

        <section className="mb-12">
          <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-4">
            <h3 className="text-2xl font-headline text-primary italic">Scorecard Summary</h3>
            <div className="flex flex-wrap items-center gap-2 justify-end">
              {matchIsNet && !matchIsStampede && (
                <div className="bg-surface-container-low p-1 rounded-xl flex items-center border border-outline-variant/15">
                  <button
                    type="button"
                    onClick={() => setSummaryScoringMode('gross')}
                    className={`px-4 py-2 rounded-lg font-label text-xs font-bold ${summaryScoringMode === 'gross' ? 'bg-primary text-on-primary shadow-sm' : 'text-on-surface-variant hover:text-primary'}`}
                  >
                    Gross
                  </button>
                  <button
                    type="button"
                    onClick={() => setSummaryScoringMode('net')}
                    className={`px-4 py-2 rounded-lg font-label text-xs font-bold ${summaryScoringMode === 'net' ? 'bg-primary text-on-primary shadow-sm' : 'text-on-surface-variant hover:text-primary'}`}
                  >
                    Net
                  </button>
                </div>
              )}
              <div className="flex items-center gap-1 text-[10px] text-on-surface-variant font-bold uppercase tracking-wider">
                <span className="material-symbols-outlined text-xs">swipe_left</span>
                Scroll
              </div>
            </div>
          </div>
          <div className="bg-surface-container-lowest rounded-xl border border-outline-variant/20 shadow-sm overflow-hidden">
            <div className="overflow-x-auto no-scrollbar">
              <table className="w-full min-w-[600px] border-collapse text-left">
                <thead>
                  <tr className="bg-primary text-[#ffe088]">
                    <th className="p-3 font-headline text-xs tracking-wider uppercase border-r border-white/10 sticky left-0 bg-primary z-10">Hole</th>
                    {front9.map(h => (
                      <th key={h.hole_number} className="p-2 text-center text-[10px] font-bold border-r border-white/5">{h.hole_number}</th>
                    ))}
                    <th className="p-2 text-center text-[10px] font-bold bg-primary-container text-[#ffe088] border-r border-white/10">OUT</th>
                    {back9.map(h => (
                      <th key={h.hole_number} className="p-2 text-center text-[10px] font-bold border-r border-white/5">{h.hole_number}</th>
                    ))}
                    <th className="p-2 text-center text-[10px] font-bold bg-primary-container text-[#ffe088] border-r border-white/10">IN</th>
                    <th className="p-2 text-center text-[10px] font-bold bg-[#735c00] text-[#ffe088]">
                      {matchIsStampede ? 'PTS' : 'TOT'}
                    </th>
                  </tr>
                  <tr className="bg-surface-container text-on-surface-variant">
                    <td className="p-2 text-[10px] font-bold uppercase tracking-tighter border-r border-outline-variant/20 sticky left-0 bg-surface-container z-10">Par</td>
                    {front9.map(h => (
                      <td key={h.hole_number} className="p-1 text-center text-[10px]">{h.par}</td>
                    ))}
                    <td className="p-1 text-center text-[10px] font-bold bg-surface-container-high border-r border-outline-variant/20">{frontParSum}</td>
                    {back9.map(h => (
                      <td key={h.hole_number} className="p-1 text-center text-[10px]">{h.par}</td>
                    ))}
                    <td className="p-1 text-center text-[10px] font-bold bg-surface-container-high border-r border-outline-variant/20">{backParSum}</td>
                    <td className="p-1 text-center text-[10px] font-bold bg-secondary-fixed/30">{matchIsStampede ? '—' : parTotal}</td>
                  </tr>
                </thead>
                <tbody className="text-primary font-body">
                  {displayBoard.map((player) => {
                    const isMe = player.user_id === user?.id;
                    const playedAny = (player.holes || []).some((s) => s.strokes != null);
                    const stQ = player.stampede_quota ?? player.stampedeQuota;
                    const inBetSm = player.in_on_bet !== false && player.inOnBet !== false;
                    return (
                      <tr key={player.user_id} className={`border-b border-outline-variant/10 ${isMe ? 'bg-secondary-fixed/10' : ''}`}>
                        <td className={`p-3 text-xs font-bold border-r border-outline-variant/20 sticky left-0 z-10 ${isMe ? 'bg-[#fffcf0] border-r border-secondary-fixed/30' : 'bg-white'}`}>
                          <span className="inline-flex flex-col gap-1">
                            <span className="inline-flex flex-wrap items-center gap-1.5">
                              {player.display_name}{isMe ? ' (You)' : ''}
                              {matchIsTeamsSummary && [1, 2].includes(Number(player.team_index ?? player.teamIndex)) && (
                                <span className="text-[8px] font-black uppercase tracking-wider px-1 py-0.5 rounded bg-primary/12 text-primary">
                                  T{Number(player.team_index ?? player.teamIndex)}
                                </span>
                              )}
                            </span>
                            {showInOutBadgesSummary && (
                              <span
                                className={`text-[8px] font-black uppercase tracking-wider px-1.5 py-0.5 rounded w-fit ${
                                  inBetSm
                                    ? 'text-secondary bg-secondary-fixed/25'
                                    : 'text-error bg-error/10'
                                }`}
                              >
                                {inBetSm ? 'In' : 'Out'}
                              </span>
                            )}
                            {matchIsStampede && (
                              <span className="text-[10px] font-bold text-on-surface-variant tabular-nums">
                                Quota <span className="text-secondary font-extrabold">{stQ != null && stQ !== '' ? stQ : '—'}</span>
                              </span>
                            )}
                          </span>
                        </td>
                        {front9.map(h => {
                          const st = effectiveStrokesForSummaryCell(player, h.hole_number);
                          return (
                            <td key={h.hole_number} className="p-1 text-center text-xs">
                              <span className={holeCellClass(st, h.par)}>{st ?? '—'}</span>
                            </td>
                          );
                        })}
                        <td className="p-1 text-center text-xs font-bold bg-primary-fixed/20 border-r border-outline-variant/20">
                          {matchIsStampede
                            ? '—'
                            : netScoreView && playedAny
                              ? (player.netFront9 != null ? player.netFront9 : '—')
                              : (player.front9 || '—')}
                        </td>
                        {back9.map(h => {
                          const st = effectiveStrokesForSummaryCell(player, h.hole_number);
                          return (
                            <td key={h.hole_number} className="p-1 text-center text-xs">
                              <span className={holeCellClass(st, h.par)}>{st ?? '—'}</span>
                            </td>
                          );
                        })}
                        <td className="p-1 text-center text-xs font-bold bg-primary-fixed/20 border-r border-outline-variant/20">
                          {matchIsStampede
                            ? '—'
                            : netScoreView && playedAny
                              ? (player.netBack9 != null ? player.netBack9 : '—')
                              : (player.back9 || '—')}
                        </td>
                        <td className="p-1 text-center text-xs font-bold bg-secondary-fixed/50">
                          {matchIsStampede ? (() => {
                            const vs = Number(player.stampede_vs_quota ?? player.stampedeVsQuota);
                            if (Number.isFinite(vs)) {
                              return (
                                <span
                                  className={`tabular-nums ${vs > 0 ? 'text-primary' : vs < 0 ? 'text-on-surface-variant' : 'text-on-surface'}`}
                                  title="Stampede total vs quota (points scored − quota)"
                                >
                                  {vs > 0 ? `+${vs}` : vs === 0 ? '0' : vs}
                                </span>
                              );
                            }
                            return '—';
                          })() : (player.total || '—')}
                        </td>
                      </tr>
                    );
                  })}
                  {matchIsTeamsSummary &&
                    [1, 2].map((tk) => {
                      const front = teamBestSumOverHoles(summaryTeamBestRows, front9, tk);
                      const back = teamBestSumOverHoles(summaryTeamBestRows, back9, tk);
                      const all = teamBestSumOverHoles(summaryTeamBestRows, holes, tk);
                      const toPar = all.any ? all.sum - parTotal : null;
                      const rowBg = tk === 1 ? 'bg-primary/[0.04]' : 'bg-secondary-fixed/[0.06]';
                      return (
                        <tr key={`summary-team-${tk}`} className={`border-b-2 border-primary/15 text-xs font-bold ${rowBg}`}>
                          <td className={`p-2 border-r border-outline-variant/20 sticky left-0 z-10 ${rowBg}`}>
                            <span className="block text-[10px] uppercase tracking-widest text-on-surface-variant">Team {tk}</span>
                            <span className="block text-primary">Best ball{netScoreView ? ' (net)' : ''}</span>
                          </td>
                          {front9.map((h) => {
                            const v = teamBestAtHole(summaryTeamBestRows, h.hole_number, tk);
                            return (
                              <td key={h.hole_number} className="p-1 text-center tabular-nums">
                                {v != null ? v : '—'}
                              </td>
                            );
                          })}
                          <td className="p-1 text-center tabular-nums bg-primary-fixed/15 border-r border-outline-variant/20">
                            {front.any ? front.sum : '—'}
                          </td>
                          {back9.map((h) => {
                            const v = teamBestAtHole(summaryTeamBestRows, h.hole_number, tk);
                            return (
                              <td key={h.hole_number} className="p-1 text-center tabular-nums">
                                {v != null ? v : '—'}
                              </td>
                            );
                          })}
                          <td className="p-1 text-center tabular-nums bg-primary-fixed/15 border-r border-outline-variant/20">
                            {back.any ? back.sum : '—'}
                          </td>
                          <td className="p-1 text-center tabular-nums bg-secondary-fixed/40">
                            <span
                              className={
                                toPar == null
                                  ? 'text-on-surface-variant'
                                  : toPar < 0
                                    ? 'text-primary'
                                    : toPar > 0
                                      ? 'text-error'
                                      : 'text-on-surface'
                              }
                            >
                              {toPar == null
                                ? '—'
                                : toPar > 0
                                  ? `+${toPar}`
                                  : toPar === 0
                                    ? 'E'
                                    : toPar}
                            </span>
                          </td>
                        </tr>
                      );
                    })}
                </tbody>
              </table>
            </div>
          </div>
        </section>

        <section className="mb-12">
          <div className="flex items-end justify-between mb-6 gap-3 flex-wrap">
            <h3 className="text-3xl font-headline text-primary">Final Leaderboard</h3>
            <span className="text-xs font-body font-bold text-secondary tracking-widest uppercase pb-1 max-w-[12rem] text-right leading-snug">{leaderboardSubtitle}</span>
          </div>
          <div className="space-y-1">
            {sortedBoard.map((player, idx) => {
              const isMe = player.user_id === user?.id;
              const playedAny = (player.holes || []).some((s) => s.strokes != null);
              const tp = netScoreView && playedAny ? player.netToPar : player.toPar;
              const vsSt = Number(player.stampede_vs_quota ?? player.stampedeVsQuota);
              return (
                <div
                  key={player.user_id}
                  className={`p-4 rounded-lg flex items-center gap-4 transition-all ${isMe ? 'bg-secondary-fixed/20 ring-1 ring-secondary-fixed/50' : 'bg-surface-container-lowest hover:bg-surface-container-high'}`}
                >
                  <span className={`font-headline text-xl w-6 ${idx === 0 ? 'text-secondary' : 'text-primary/40'}`}>{idx + 1}</span>
                  <div className="w-10 h-10 rounded-full border border-outline-variant overflow-hidden bg-surface-container-high flex items-center justify-center text-[10px] font-bold">
                    {player.avatar_url ? <img alt="" className="w-full h-full object-cover" src={player.avatar_url} /> : initials(player.display_name)}
                  </div>
                  <div className="flex-grow min-w-0">
                    <p className="font-body font-bold text-primary truncate">{player.display_name}{isMe ? ' (You)' : ''}</p>
                    <p className="text-[10px] text-on-surface-variant uppercase tracking-tighter">HCP {player.handicap_index ?? '—'}</p>
                  </div>
                  <div className="text-right shrink-0 min-w-0">
                    {matchIsStampede ? (
                      Number.isFinite(vsSt) ? (
                        <p
                          className={`font-headline text-lg md:text-xl tabular-nums leading-tight ${vsSt > 0 ? 'text-primary' : vsSt < 0 ? 'text-on-surface-variant' : 'text-on-surface'}`}
                        >
                          {vsSt > 0 ? `+${vsSt}` : vsSt === 0 ? '0' : vsSt}
                        </p>
                      ) : (
                        <p className="font-headline text-xl text-primary">—</p>
                      )
                    ) : (
                      <>
                        <p className="font-headline text-xl text-primary">{formatToPar(tp)}</p>
                        <p className="text-[10px] text-on-surface-variant font-bold tabular-nums">
                          {!playedAny
                            ? '—'
                            : netScoreView && player.netTotal != null
                              ? `${player.netTotal} net`
                              : (player.total || '—')}
                        </p>
                      </>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </section>

        <section className="mb-12">
          <div className="bg-surface-container-highest p-8 rounded-2xl">
            <h3 className="text-2xl font-headline text-primary mb-6 text-center italic">The Payouts</h3>
            <div className="space-y-6">
              {payoutRows.map((row, i) => (
                <div key={row.user_id} className={`flex items-center justify-between ${i > 0 ? 'border-t border-primary/5 pt-4' : ''}`}>
                  <div className="flex items-center gap-3 min-w-0">
                    <span className="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-xs font-bold shrink-0 overflow-hidden">
                      {row.avatar_url ? <img alt="" className="w-full h-full object-cover" src={row.avatar_url} /> : initials(row.display_name)}
                    </span>
                    <span className="font-body text-primary truncate">{row.display_name}{row.user_id === user?.id ? ' (You)' : ''}</span>
                  </div>
                  <span className={`font-headline text-xl shrink-0 ml-2 ${row.net > 0 ? 'text-primary' : row.net < 0 ? 'text-error' : 'text-on-surface-variant'}`}>
                    {`${row.net > 0 ? '+' : row.net < 0 ? '-' : ''}$${Math.abs(row.net).toFixed(2)}`}
                  </span>
                </div>
              ))}
            </div>
            <p className={`text-center text-[11px] mt-4 font-body ${Math.abs(groupPayoutSum) < 0.02 ? 'text-on-surface-variant' : 'text-error font-semibold'}`}>
              {Math.abs(groupPayoutSum) < 0.02
                ? 'Group totals net to zero — all payouts are transfers between players.'
                : `Group net is off by $${Math.abs(groupPayoutSum).toFixed(2)} (expected $0.00).`}
            </p>
          </div>
        </section>

        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-16">
          <button
            type="button"
            onClick={shareResults}
            className="bg-primary text-white py-4 rounded-md font-body font-bold uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-primary-container transition-all active:scale-[0.98]"
          >
            <span className="material-symbols-outlined text-sm">share</span>
            Share Results
          </button>
          <button
            type="button"
            onClick={() => navigate('/')}
            className="bg-white border border-primary/20 text-primary py-4 rounded-md font-body font-bold uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-surface-container-high transition-all active:scale-[0.98]"
          >
            Back to Sandbags
          </button>
        </div>
      </main>
      <BottomNav />
    </div>
  );
};

// ============================================================
// APP
// ============================================================
const App = () => (
  <AppRouter>
    <AuthProvider>
      <AppShell />
    </AuthProvider>
  </AppRouter>
);

createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
